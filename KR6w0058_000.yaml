front:
  text: 重梓閲藏隨録大藏卷帙浩繁塵勞衆生耳因淺劣如來金口度世之詞束之高閣省覽者希此玄惲師法苑珠林之所以輯也義取警俗類為百卷王芥庵先生猶恐其繁就中摘其切要者帙不滿寸顏曰閲藏隨録梓而行之矣曹銓部含祖以一編相𭔃公餘簡較觸眼驚心時復愧汗浹背願諸學人有同志者人人奉之座右信而行之即此寸書饒具百千萬億丈精進法幢謂如來現身可也為再登劑劂用廣其傳時崇禎壬申歲冬孟月琢如居士題於廬陽公署閲藏隨録小敘自夫三藏西涉竺蘭東遊金口之詞被乎中域盈縑積素浩汙莫窮緇素觀徒增慨慕屬有西明大德道世法師字玄惲沙門之領袖也德鏡幽玄業標清白念戒定慧為學佛之津梁經律論為入門之筌筏纂緝雖夥各懷異見尚名理者涉于玄虛詳事相者墮于枝蔓乃總羣籍會歸一源亡我亡瑕渾融乎四諦達物達化大濟於五乘傳輝寫液照潤區宇直欲排蕩重垢冶纖塵前際後際並契真如先心末心咸趣正覺編次有年僅得百卷名曰法苑珠林述而不作贍而居要幾與智度婆沙並轡馳驅者矣余丙辰閲藏徑山轉般若華嚴二部千餘卷遇有會意隨閲隨録惜未竟全藏而有峩眉之行忽忽十餘年矣茲將遊歷𢖍廬道經毗陵時已初夏計前途向炎不便行役乃詣荊溪善權寺舊遊之地則無著禪師藏經閣在焉面對修竹背負層嶺雲泉瀰漫蘭風扇芬晨曦未起焚香端坐披覽茲編六十日而畢古人云明道易行道難又云説得一丈不如行得一尺説得一尺不如行得一寸尚書亦云知之非艱行之惟艱今之所緝意在於行咸令息駕返源識心達本履踐純一躋于無漏慧日長朗不處重昏豈事漁獵徒資口耳而已若謂牛涔之微爭長江漢自惟茫昧不至於斯儻遇知音未必姍笑但得領其一言即熱惱中之清涼散因而求之全帙則末法中之精進幢也余何幸焉余何幸焉天啓丙寅七月芥道人大敬識
