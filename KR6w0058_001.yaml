body:
  text: 法苑珠林依起世經云爾時復經無量久遠不可計數日月時起大重雲乃至遍覆梵天世界既遍覆已注大洪雨其滴甚粗或如車軸或復如杵經歷百千萬年彼雨水聚漸漸增長乃至天所住世界其水遍滿然彼水聚有四風輪之所住持何等為四一名為住二名安住三名不墮四名牢住彼雨斷已復還自退下無量百千萬億由旬當於爾時四方一時有大風起其風名為阿那毗羅吹彼水聚混亂不停水中自然生大沫聚大風吹沫擲置空中從上造作梵天宮殿妙可愛七寶間成謂金銀琉璃頗梨赤珠硨磲瑪瑙有斯梵天世間出生彼大水聚復更退下無量百千萬億由旬如前四方風起名阿那毗羅由此大風吹擲水沫復成宮殿魔身天牆壁住如梵身天無異唯有寶色精粗異耳如是次造他化自在天展轉至夜摩天六天次第具足如梵天無異精粗異耳時彼水聚轉復減少乃更退下無量百千億萬由旬湛然停住彼水聚中四方浮沫水上厚六十八億由旬周濶無量大風吹沫復造須彌山四寶所成復吹水上浮沫為三十三天七寶所成又吹水沫於須彌山半腹之間四萬二千由旬為日月天子宮殿皆七寶成以是因緣世間便有七日宮殿安住現在又吹水沫於海水上高萬由旬為空居夜義造頗梨宮殿城郭亦爾又吹水沫於須彌山四面各去山一千由旬大海之下作四面阿修羅城七寶莊嚴又復大風吹水聚沫造作餘大寶山如是展轉吹水沫過四大洲八萬小洲須彌山王并餘一切大山之外周市安置名大輪圍山高廣正等六百八十萬億由旬牢固直實金剛所成難可破壞如是大風吹掘大地漸漸深入乃於其中置大水聚湛然停積以此因緣便有大海依華嚴經云三千大千世界以無量因緣乃成且如大地依水輪水依風輪風依空輪空無所依然衆生業感世界安住故智度論云三千大千世界皆依風輪為基又新菩藏經云諸佛如來成就不思議智故而能行知諸風雨相知世有大風名烏盧博迦乃至衆生諸有覺受皆由此風所搖動故此風輪量高三拘盧舍於此風上虛空之中復有風起名曰雲風輪此風輪量高五拘盧舍於此風上虛空之中復有風起名聸薄迦此風輪量高十踰繕那於此風上虛空之中復有風起名吠索縛迦此風輪量高三十踰繕那又此風上虛空之中復有風起名曰去來此風輪量高四十踰繕那如是舍利子次第輪上六萬八千拘胝風輪之相如來應正等覺依止大慧悉能了知舍利子最上風輪名為周遍上界水輪之所依止其水高量六十八百千踰繕那為彼大地之所依止其地量高六十八千踰繕那舍利子是地量表有一三千大千世界又樓炭經云此地深二十億萬里下有金粟亦二十億萬里下有金剛亦二十億萬里下有水際八十億萬里下有無極大風深五百二十億萬里此雖六重前四是地輪第五是水輪第六是風輪問曰六趣之報造何業生答曰依智度論說六趣之業不過善惡各有三品上者生天中者生人下者生四惡趣若依此義但善上品即得生天不分散定別邪若依業報差別經中具說十善得生天趣具分定散三界差別經云復有十善能令衆生得欲界天報具修增上十善得生欲界天報則欲界散善業也復有十業能令衆生得色界天報為修有漏十善與定相應此則色界定善業也復有四業能令衆生得無色界天報一者謂過一切色想滅一切有對想入空處定二者過一切空處定入識處定三者過一切識處定入無所有處定四者過一切無所有處定入非想非非想處定以是四業得無色界報若爾此界何故不言十善業者應言此界是無色報離色而修遠離身口是故據地但言四業不就十善也如起世經云佛告諸比丘有五因緣能障礙雨令占師不測增長迷惑記天必雨而更不雨何者為五一於虛空中雲興雷作伽荼伽荼瞿厨瞿厨等聲或出電光或有風吹冷氣至如是種種皆是雨相諸占察人及天文師等悉尅此時必當降雨爾時羅睺阿修羅王從其宮出便以兩手撮彼雨雲擲置海中此是第一雨障因緣占者不知而竟不雨第二有時虛空起雲雲中亦作伽荼等聲亦出電光復有風吹冷氣來時占者見相尅天降雨爾時火界增上力生即於其時雨雲燒滅此名第二雨障因緣占者不知而遂不雨第三有時虛空中起雲雲中亦作伽荼等聲亦出電光復有風吹冷氣來時占者見已記天必雨以風界增上力生則吹雲擲置於彼迦陵迦磧中或置諸曠野中或置摩那磧地此名第三雨障因緣占者不知而遂不雨第四有諸衆生為放逸污清淨行故天不降雨第五為𨶒浮提人有不如法慳貪嫉妬邪見顛倒故天則不雨依佛般泥洹經云阿難義手問佛欲知地動幾事佛語阿難有三因緣一為地倚水上水倚於風風倚於空大風起則水擾水擾則地動二為得道沙門及神妙天欲現感應故以地動三為佛力自我作佛前後已動三千日月萬二千天地無不感發天人鬼神多得開解夫論天報識復豐華服玩光新身形輕妙而自在天上更是魔王無想定中為外道四空之頂邪執不輕六欲之間迷惑殊重不能受持般若供養涅槃憍慢轉增我人逾盛所以頭華萎髻液汗流襟寶殿歇光羅衣聚膩憑斯淨心悉皆懺蕩普為四王忉利兜率炎摩化樂他化梵王梵輔光音遍淨廣果那含不煩不熱善見善現空處識處不用處非非想處乃至橫窮他界𥪡極上天或復端坐華臺動逾劫數凝神玉殿一視千年願今自然之服不離身形善法之堂永蒙游觀絶生離之病無戰陳之勞長謝五衰𢘆豐七寶色像端嚴容儀煒燁永離苦因清升樂果也略論諸天報身之相所謂諸天皆無骨肉亦無大小便利不淨身放光明無別晝夜報得五通形無障礙正法念經云彼夜摩天或有一百或有一千共聚在一蓮花鬚同坐不妨不隘不窄以善業故自業力故問曰色界有身有苦可爾無色無形苦受何生答曰彼報精微凡小不覩無其粗礙非無細色智度論云上二界時退時生大惱甚於下界譬如極處墮摧碎爛問曰生上天者離惡積善何故報𥁞即入三塗答曰凡夫無始以來惡業無窮一日貪瞋尚受千形况惡既多暫伏結生報福既盡昔業時熟還墮三塗何所致惑故成實論云人在色無色界謂是涅槃臨命盡時見欲色中隂即生邪見謂無涅槃謗無上法當知彼中有不善業菩處胎經佛問彌勒心有所念幾念幾相識耶彌勒言舉手彈指之頃三十二億百千念念念成形形皆有識識念極微細不可執持佛之威神入彼微識皆令得度此識教化非無識也四分律云時阿難持故器𭣣世尊髮佛言不應以故器盛如來髮應用新器新衣繒綵若鉢衣裹盛之依華嚴云佛子一切諸佛於念中悉能出生十無盡智何等為十於一念中悉現一切世界從兜率天命終於一念中悉現一切世界菩薩出生於一念中悉現一切世界菩薩出家於一念中悉現一切世界往詣道場菩提𣗳下成等正覺於一念中悉現一切世界轉淨法輪於一念中悉現一切世界隨應化導一切衆生悉令解脫於一念中悉於一切世界現莊嚴身隨應衆生於一念中悉現一切世界種種莊嚴無數莊嚴如來自在一切智藏於一念中悉現一切世界清淨衆生於一念中遍一切世界悉現三世一切諸佛於一念中為種種諸根精進欲性故現顯三世諸佛種性成等正覺開導衆生佛子是為一切諸佛於念念中生十無盡智智度論云如阿毗曇說一時無二心者若化佛語時化主默然若化主語時化佛亦應默然云何佛一時皆說六波羅密答曰此如外道聲聞變化耳如佛變化無量三昧力不可思議是故佛自語時無量千萬億化佛亦一時皆語又諸外道及聲聞化不能作化如佛世尊化復作化故諸外道聲聞滅後不能留化如佛滅後能留如佛無異如毗曇中一時無二心者今佛亦如是當化語時亦不有心佛心念化欲令化語即便皆語依菩薩處胎經云爾時世尊示現奇特異像變一切菩薩盡作佛身光相具足皆𠔏異口同音說法互相敬奉各坐七寶極妙高座初一說法純男無女第二說法純女無男第三說法純度正見人第四說法純度邪見人第五說法男女正等第六說法邪正亦等當爾之時法法成就而無吾我道果成熟諸佛常法說義神足第七八萬四千空行法門第八八萬四千無相法門第九八萬四千無願法門一一法門有無量義猶如黠慧之人身有千頭頭有千舌舌有千義欲得究盡此九法門義於百千分未獲其一此是諸佛祕要之藏皆由前身宿學成就唐潞州法住寺釋曇榮俗姓張氏定州人也神厲氣清觀榮勤攝隨緣通化曾無執著每年春夏立方等般舟至于秋冬各興禪誦乃告衆曰舍利之德挺變無方若苦業有銷請祈可遂乃人人前別置水鉢加以香爐通夜苦求至明鉢內總獲舍利四百餘粒後時所住堂舍忽自崩壞龕像舍利宛然挺出布在庭中一無所損又至貞觀七年清信士常凝保等請榮於州治法住寺行方等懺法至七月十四日有本寺沙門僧定者戒行精固於道場內見大光明五色間起從上而下中有七佛相好非常語僧定云我是吡除去諸相彌勒當知如是十念一一次第相續而起不生彼國無有是處或說三十七品是菩薩淨土菩薩成佛時念處正勤神足根力覺道衆生來生其國或如無量壽經云發四十八願而生淨土普賢觀經云若有晝夜六時禮十方佛誦大乘經思第一義甚深空法於一彈指頃除百萬億那由他𢘆河沙劫生之罪行此法者真是佛子從諸佛生十方諸佛及諸菩薩為其和上是名具足菩薩戒者不須羯磨自然成就應受一切人天供養阿難請戒律論云僧尼白衣等因讀經律論等行語手執卷者依忉利天歲數犯重突吉羅𠊓報二億歲墮麞鹿中𢘆被摺脊苦痛難忍無記戲言捉經律論亦招前報或安經像房堂簷前者依忉利天歲數八百歲犯突吉羅傍報二億歲墮猪狗中生若得人身一億歲𢘆常作客栖屑不得自在齊太原釋慧寶誦經得二百卷恃己誦博頗心自矜有神人身著草衣夜至二更從外而至謂寶曰修道者未應如此欲聞何經為誦之寶曰樂聞華嚴僧即婆尸如來無所著至真等正覺以汝罪銷故來為證然非本師不與受記如是六佛皆同此詞最後一佛云我是汝本師釋迦牟尼也為汝罪銷故來授記曇榮是汝滅罪良緣於賢劫中名普寧佛汝身器清淨後當作佛名為普明若斯之應現感靈祥信難圖矣法性土以真如為體故梁攝論云以蓮華王為淨土所依譬法界真如為淨土所依體故實報土依攝論云以二空為門二慧為出入路奢摩他毗鉢舍那為乘以根本無分別智為用彌勒發問經云若欲發生安養國者當修十念即得往生何等為十一者於一切衆生常生慈心二者於一切衆生不毀其行若有毀者終不往生三者於一切衆生深起悲心除殘害心四者發護法心不惜身命於一切法不生誹謗五者於忍辱中生决定心六者深心清淨不染利養七者發一切種智心日日常念無有忘八者於一切衆生生尊重心除憍慢心謙下言說九者於諸談話不生染著心近於覺意深起種種善根因緣不生憒閙散亂心十者常念觀佛少時誦之更令誦餘經悉皆如此寶驚歎曰何因大部經文倐然即度報曰汝是有作心我是無作心夫忘懷於萬物者彼我自得矣梁廣州南海何規採藥於豫章胡翼山有長者年可八九十手提書一卷遙投與規開視卷內題名為慧印三昧經經旨以至極法身無相為體理出百非義踰名相寂同法相妙等真如言其慧照此理有若全印心冥凝寂故以三昧為名寶性論云三寶有六義故須敬也一者希有義如世寶物貧窮之人所不能得三寶如是薄福衆生百千萬世不能值遇故名為寶二者離垢義如世真寶體無瑕穢三寶如是絶離諸漏故名為寶三者勢力義如世珍寶除貧去毒有大勢力三寶如是具不思議六神通力故說為寶四者莊嚴義如世珍寶能嚴身首令身姝好三寶如是能嚴行人清淨身故故說為寶五者最勝義如世珍寶譬諸物中勝三寶如是一切世中最為殊勝故名為寶六者不改義如世真金燒打磨鍊不能變改三寶如是不為世間人法所改故名為寶十輪經云佛言俗姓子有四種僧何等為四一第一義僧二淨僧三啞羊僧四無慚愧僧云何名為第一義僧諸佛菩薩辟支及四沙門果是七種人名為第一義僧在家得聖果者亦名第一義僧云何名為淨僧諸有能持具足戒者是名淨僧云何名為啞羊僧不知犯不犯輕重微細罪可懺悔愚癡無智不近善知識不能咨問深義是善非善如是等相名為啞羊僧云何名為無慚愧僧若有為自活命來入佛法悉皆毀犯破和合僧不畏後世放縱六情貪著五欲如是人等名為無慚愧僧出家功德經云若放男女奴婢人民出家功德無量譬四天下滿中羅漢百歲供養不如有人為涅槃故一日一夜出家受戒功德無量又如起七寶塔高至三十三天不如出家功德又大緣經云以一日夜出家故二十劫不墮三惡道又僧祗律云以一日夜出家修梵行者離六百六千六十歲三塗苦又經云若為出家苦作留礙破壞抑制此人即斷佛種諸惡集身猶如大海現得病入黑暗地獄無有出期又迦葉經云爾時大王太子聞出家功德甚深並皆發心出家已四天下中無一衆生在家者皆悉發心願求出家彼諸衆生既出家已不須種殖其地自然生諸粇米諸樹自然生諸衣服一切諸天供侍給使藏經云當一心行道隨順法行勿念衣食有所須者如來白毫相中一分供諸末代一切出家弟子亦不能盡遺教經云慚如鐵鈎能制人非法是故比丘常當慚愧無得暫替若離慚愧則失諸功德有愧之人則有善法若無愧者與諸禽獸無相異也正法念經云若破戒多欲而行惡法實非沙門自稱沙門猶如野干著獅子皮如虛僞寶內空無物提謂經云如有一人在須彌山上以纖縷下之一人在下持針迎之中有旋嵐猛風吹縷難入針孔人身難得甚過於是略論中下之人薄學淺識謂智過人起大憍慢放誕形容陵一切籠天地踑踞師長之前叱吒尊人之側道本和合恭順為僧既心形反豈成僧寶也或有專讀外典歌詠琴碁諷誦詩書徒消日月內教法藥救生為急文奧理深辭華心博能解一句演無量義新舊經論卷軸數千曾不窺檢一句之義外書不急之事日夜勤學若恐白衣笑我無知不學世典者何如俗人問我經義不能答耶居內不間於外未足可羞在內不解於內耻辱彌甚良由時將末法人命轉促無常交臂朝不謀夕恐一入幽塗纍劫難出再遇佛法想見無由雖有經律許一分學外為伏外道此為上品聰𠮉者說先諳於內兼令知外機辨鋒芒出言開典內外究堪為師匠得如經說為伏外道涅槃經云佛語諸比丘出家之人應修慧學尋究經典不得披讀外道典籍路伽耶等常處山澤空間靜室修禪禮誦斷邪顯正是汝所宗夫法師升座先須禮敬三寶自淨其心觀時擇人具慈悲意救生利物然後為說故報恩經云聽者坐說者立不應為說若聽者求說者過不應為說若聽者依人不依法依字不依義依不了義經不依了義經依識不依智並不應為說何以故是人不能恭敬諸佛清淨法故正法念經云若有衆生正行善業為邪見人說一偈法令淨信佛命終生應聲天受種種樂從天還退隨業流轉若為財物故與人說法不以悲心利益衆生而取財物或用飲酒或與女人共飲共食如伎兒法自賣求財如是法施其果甚少生於天上作智慧鳥能說偈頌是則名為下品法施也云何名為中品法施耶為名聞故為勝他故為勝餘大法師故為人說法或以妬心為人說法如是法施得報亦少於天中得中果報或生人中是則名曰中品法施也云何名為上品法施耶以清淨心為欲增長衆生智慧而為說法不為財利為令邪見衆生等住於正法如是法施自利利人無上最勝乃至涅槃其福不盡是則名曰上品法施也金光明經云說法者有五種事一者法施彼我兼利財施不爾二者法施能令衆生出於三界財施者不出欲界三者法施利益法身財施之者長養色身四者法施增長無窮財施必有竭盡五者法施能斷無明財施只伏貪心故知財施不及法也成實論云若人但能為他說法是名利他是人雖不自隨法行為他說故自亦得利於此施門略有三品下法施者說布施法不說智慧中法施者說於持戒上法施者說於智慧以說智慧教人觀理得斷惑智二障出離生死遠成菩提涅槃樂果正法念經云若人供養說法法師當知是人即為供養現在世尊其人如是隨所供養所願成就乃至得阿耨菩提以能供養說法法師故何以故以聞法故心得調伏以調伏故能斷無知流轉之暗若離聞法無有一法能調伏心菩薩處胎經云佛告善男子善女人修眼聖通除色斷垢三空定門便能得見一千天下二千天下三千大千天下或有聞一天下千天下二千天下三千大千天下一切諸聲善惡六道悉能曉了或有人除去識垢內外無瑕得意聖通自識宿命一生下生乃至無數阿僧祗劫所從來處父母眷屬國土清淨悉能識知或有修十神通解知法性強記不忘便能得知他人心念一生二生乃至無數阿僧祗劫所從來處父母眷屬國土清淨名姓種皆悉知之或有人思惟法觀以心持身以身持心睡眠覺悟意想如空便能舉身一天下二天下乃至三千大千剎土入地如空山河石壁無所𦊱礙或有人臨當成佛以智慧力除衆生垢坐𣗳王下不起于座故得成佛六通清徹新婆沙論云魔王遂見菩薩坐菩提𣗳端身不動誓取菩提速出自官往菩薩所謂菩薩曰剎帝利子可起此座今濁惡時衆生剛強定不能證無上菩提且應現受轉輪王位我以七寶當相奉獻菩薩告曰汝今所言如誘童子日月辰星可令墮落山林大地可升虛空欲令我今不取大覺起此座者定無是處後魔將三十六俱胝魔軍各現種種可畏形執持戰具色類無邊遍三十六踰繕那量俱時奔趨菩提𣗳下惱亂菩薩皆不能得菩薩身心不動逾於蘇迷山也大方等大集念佛三昧經云大目連答阿難言憶念我昔於一時間取此三千大千世界悉內口中其時衆生乃至無有一念驚覺往來想復念我昔在世尊前作師子吼能以須彌內于口中能過一劫若減一劫如是為常復念往昔至於東方往彼等三千世界有一大城名曰寶門於彼有六萬億千家我於彼中一一皆現我身而為說法安住正法爾時阿難念言我昔取一袈娑投置地上時大目連第一上座威神若是既不能取乃至不能舉令離地云何手擎阿難又念我昔居世尊前作師子時諸外道欲共我較隱身說法唯除世尊一切知見大力菩薩自外所有聲聞弟子乃至外道而問我隱沒身時住在何處終不能知我身所在爾時大迦葉答阿難言我念一時在世尊前作師子吼於此三千大千世界須彌諸山之屬一以口吹能令破散乃至無有如微塵許其有衆生住彼山者不令損害亦無覺知如是諸山皆悉滅也我又一時於此大千世界一切大海河池諸山乃至無量億千那由他百千水聚以口一吹皆令乾竭而彼衆生不知不覺我又一時在大衆前作師子吼能於三千大千世界之內以口一吹即令大火熾然遍滿猶如劫燒終亦不使損一衆生竟不覺知爾時彌勒文諸大菩薩等聞大迦葉作師子吼便化華聚若須彌山乃至再三散迦葉上復化作大七寶蓋住虛空中覆大迦葉頂并覆一切聲聞大衆又譬喻經云昔有夫妻二人無子祠祀天神以求系胤神即許之遂便懷妊生四種物一者㫋檀斗盛米二者甘露瓶三者寶囊四者七節神杖其人歎曰吾求兒子更生餘物便到神所重求所願神即語言汝欲得子何物稱益答曰子當使令給養吾等神云食此米升用之無盡甘露蜜瓶食之無減而消百病珍寶之囊用之無損七節神杖以備凶暴兒子豈能辦此其人大喜還家試驗如言不虛遂成大富不可算計國王聞之即遣衆兵欲往攻奪其人擎杖飛遊擊敵摧破強衆皆悉退散其人歡喜無復憂患智度論云佛在世時有人遠行獨宿空舍夜中有鬼擔一死人來著其前復有一鬼逐來瞋罵云死人我物汝忽擔來先鬼言是我物我自持來後鬼言是死人實我擔來二鬼各捉一足一手爭之前鬼言此間有人可問後鬼即問是人誰擔來是人思惟此二鬼力大若實不實俱不免便語言前鬼擔來者是後鬼大瞋捉其人手捩出著地前鬼愍之急取人一臂附之即著如是兩臂兩腳頭脅舉身皆易於是二鬼共食所易人身拭口而去其人思惟我父母生身眼見二鬼食盡今我此身悉是他空我今定有身耶為無身耶行到佛塔問諸比丘廣說上事諸比丘言從本已來𢘆自無我但以四大和合故計為我身如汝本身與本無異諸比丘度之為道得阿羅漢智度論云菩薩思惟觀空無常相故雖有妙好五欲不生諸結辟如國王有一大臣自覆藏罪人所不知王言取無脂肥羊來汝若不得者當與汝罪大臣有智繫一大羊以草好養日三以狼而畏怖之羊雖得養肥而無脂牽羊與王王遣人殺之肥而無脂王問云何得爾答以上事菩薩亦如是見無常苦空狼令諸結脂消諸功德肉肥雜寶藏經云昔難陀王聰明博通事無不練以己所知謂無酬敵羣臣無對時諸臣等即白王言有比丘名那伽斯那聰明絶倫今在山中王欲試之即使人賫一瓶蘇湛然盈滿王意以為我智滿足誰加於我斯那獲蘇即解其意於弟子中斂針五百用刺蘇中蘇亦不溢尋遣歸王王既獲已即知其意尋遣使請斯那即赴延入宮中王與粗食食三五匙便言已足後與細美方乃復食王復問言向云已足何故今者猶故復食斯那答言我向足粗未足於細即語王言今者殿上可盡集人令滿其上尋即喚人充塞遍滿更無容處王在後來將欲上殿諸人畏故盡皆攝衣其中轉寬乃多容人斯那爾時即語王言粗飯如民細者如王民見於王誰不避路王復問言出家在家何者得道斯那答言二俱得道王復問言若二俱得道何用出家斯那答言譬如去此三千餘里若遣少健乘馬賫糧捉於器仗得速達不王答言得若遣老人乘於瘦馬復無糧食為可達不王言縱令賫糧猶恐不達况無糧也斯那答言出家得道喻如少壯在家得道如彼老人王復問言日之在上其體是一何以夏時極熱冬時極寒夏則日長冬則日短斯那答言須彌山有上下道日於夏時行於上道路遠行遲照於金山故長而暑熱日於冬時行於下道路近行速照大海水短而極寒又佛說心明經云爾時世尊為梵志乃笑五色光從口出照十方五趣之類夫欲至人心喜令餓鬼飽地獄痛息畜生意開罪除尋光來詣佛所諸佛笑法皆有常瑞若授菩薩决遍照十方光從頂入授緣覺决光入面門授聲聞决光入肩井說生天事光從䐡入說降人中光從入說趨三苦光從足心入諸佛之欣不以欲笑不以瞋笑不以癡笑不放逸笑不利欲笑不榮貴笑不富饒笑今佛普等愍傷羣生行大慈笑無斯七也罪福决疑經云僧尼白衣等或自捨財及勸化得物擬佛受用經營人將此物造作鳥獸形像安佛槃上者計損滿五錢犯逆罪究竟不還一劫墮阿鼻地獄贖香油燈供養者無犯佛不求利無人堪消初獻佛時上中下座必教白衣奉佛及僧獻佛竟行與僧食不犯若不爾者食佛物故千億歲墮阿鼻地獄檀越不受前教亦招前報若生人間九百萬歲墮下賤生何以故佛物無人能評價故華手經云佛告舍利弗菩薩有四法終不退轉無上菩提何等為四一者若見塔廟毀壞當加修治若塊若泥乃至一磚二者若於四衢道中多人觀處起塔造像為作念佛善福之緣塔中畫作若轉法輪及出家相乃至雙𣗳入涅槃相三者若見有比丘僧二部諍訟勤求方便令其和合四者若見佛法欲壞能讀誦說乃至一偈令法不絶為護法故敬養法師專心護法不惜身命菩薩若成是四法者世世當作轉輪聖王得大身力如那羅延捨四天下而行出家能得隨意修四梵行命終生天作大梵王乃至究竟成無上道是故智者欲求佛道當作是學福田經云有比丘名阿難白世尊曰我念宿命生羅閲祗國為庶民子身生惡瘡治之不瘥有親友道人來語我言當浴衆僧取其浴水以用洗瘡便可得愈又可得福我即歡喜往到寺中加敬至心更作新井香油浴具洗浴衆僧以汁洗瘡尋蒙除愈從此因緣所生端正金色晃昱不受塵垢九十一劫常得清淨福祐廣遠今復值佛心垢消滅逮得應真如增一阿含經云爾時世尊告諸比丘當修行十法便成神通去衆亂想至致涅槃第一念佛專精念佛如來形相功德具足身智無崖周旋往來皆具知之修行一法自致涅槃不離念佛便獲功德第二念法專精念法除諸欲愛無有塵勞渴愛之心永不復興於欲無欲離諸結縛諸蓋之病猶如衆香之氣無有瑕疵亂想之念便成神通自致涅槃思惟不離便獲功德第三念衆者謂專精念如來聖衆成就質直無有邪曲上下和穆如來聖衆四雙八輩當敬承事除諸亂想自致涅槃第四念戒所謂戒者息諸惡故戒能成道令人歡喜戒瓔珞身現衆好故猶如吉祥瓶所願便尅除諸亂想自致涅槃第五念施謂專精念施所施之上永無悔心無反報想快得善利若人罵毀相加刀杖當起慈心不興瞋恚我所施者施意不絶除諸亂想自致涅槃第六念天謂身口意淨不造穢行行戒成身身放光明無所不照成彼天身善業果報成彼天身衆行具足除諸亂想自致涅槃第七念休息謂心意想息志性詳諦亦無卒暴恆專一心意樂閒居常行方便入三昧定常念不貪勝念上達除諸亂想自致涅槃第八念安般專精念安般者若息長時觀知我今息長若復息短觀知我今息短若息極冷極熱觀知我今息冷熱出入分別數息長短除諸亂想自致涅槃第九念身謂髮毛爪齒皮肉筋骨膽肝肺心脾腎大腸小腸屎尿唾涕等何者是身地種水種火種風種是也皆是父母所造從何處來為誰所造此之六根於此終已當生何處除諸亂想自致涅槃第十念死謂專精念死此沒生彼往來諸趣命逝不停諸根散壞如腐敗木命根斷絶種分離無形無響亦無相貌除諸亂想自至涅槃夫戒有三種一是俗戒二是道戒三是定戒五八十具戒等為俗戒無漏四諦為道戒三昧禪思為定戒以慧御戒使成無漏乃合道戒聲聞家戒喻若華動則解散大士持戒喻若頭上插華行止不動小乘檢形動則越儀大士領心不拘外軌大小軌異故以形心為內外雖俱至涅槃故曰念戒也雜阿含經云爾時世尊告諸比丘過去世時有河中草有龜於中住止時有野干饑行覔食遙見龜蟲疾來捉取龜蟲見來即便藏六野干守伺冀出頭足欲取食之久守龜蟲永不出頭亦不出足野干饑乏瞋恚而去諸比丘今日亦復如是知魔波旬常伺汝便冀汝眼著於色耳聞聲鼻嗅香舌嘗味身著觸意念法欲令出生染著六境是故比丘汝等今日常當執持眼律儀注執持眼根律儀惡魔不得其便隨出隨緣耳鼻舌身意亦復如是於其六根若出若緣不得其便猶如龜蟲野干不得其便又木槵子經云時有難國王名波琉璃白佛言我國邊小頻歲寇賊五涌貴疫疾流行人民困苦我𢘆不安法藏深廣不得修行唯願矜賜我法要佛告王曰若欲滅煩惱障當貫木槵子一百八常以自隨至心無散稱南無佛陀南無達摩南無僧伽乃過一木槵子如是漸次度木患子若十二十若百若千乃至百千萬若能滿二十萬遍身心不亂諸諂曲者捨命得生第三熖摩天衣食自然常安樂行若復能滿一百萬遍者當斷除百八結業獲無上果王聞歡喜我當奉行佛告王曰有莎升比丘誦三寶名經歷十歲得成斯陀含果漸次修行今在普香世界作辟支佛王聞是已倍復修行又惟無三昧經云佛告阿難善男子人求道安禪先當斷念人生世間所以不得道者但坐思想穢念多故一念來一念去一日一宿有八億四千萬念念不息一善念者亦得善果報一惡念者亦得惡果報如響應聲如影隨形是故善惡罪福各別地持論云菩薩有十種大願一者願一切種供養供養無量諸佛二者願護持一切諸佛正法三者願通達諸佛正法四者願生兜率天乃至般涅槃五者願行菩薩一切種正行六者願成熟一切衆生七者願一切世界悉能現化八者願一切菩薩一心方便以大乘度九者願一切正行方便無礙十者願成無上正覺文師利問菩提經云爾時天子問文師利言菩薩有幾心能攝因能攝果文答言諸菩薩有四心能攝因攝果何等為四一初發心二行道心三不退轉心四一生補處心初發心為行道心作因緣行道心為不退轉心作因緣不退轉心為一生補處心作因緣也又初發心如種田中行道心如子增長不退轉心如華果始成補處心如華果有用又初發心如月新生行道心如月五日不退轉心如月十日一生補處心如月十四日如來智慧如月十五日又大集經云爾時舍利弗白佛言世尊菩薩初發無上菩提心時聞諸衆生有如是行不驚不怖是事實難不可思議佛言舍利弗於意云何如師子雖復初産聞師子吼有怖畏否否也世尊菩薩摩訶薩初發無上菩提心時聞衆生行亦復如是舍利弗於意云何火熱雖小畏乾薪不不也世尊菩薩初發無上菩提心已得智慧火亦復如是舍利弗今以非喻為喻舍利弗譬如猛火與諸乾薪結期七日當大戰鬬爾時一切乾𣗳草木種種枝葉悉共合聚如須彌山爾時猛火有一親友而告之言汝今何故不自莊嚴多覔有救援助彼衆汝唯一己何能當之時火答言彼怨雖多我力能敵不須伴黨舍利弗菩薩摩訶薩亦復如是雖諸煩惱悉共和合其勢熾盛菩薩智慧力能消伏如阿伽陀一丸之藥能破大毒菩薩智慧亦復如是小智慧藥能壞無量煩惱大毒施燈功德經云施佛塔廟燈明已得於八種可樂勝法何等為八一者獲勝肉眼二者得於勝念無能測量三者得於勝達淨分天眼四者為於滿足修集道故得不戒五者得智滿足證於涅槃六者先所作善得無難處七者所作善業得值諸佛能為一切衆生之眼八者以彼善根得轉輪王所得輪寶不為他障其身端正或為帝釋得大威力具足千眼或為梵王善弘梵事得大禪定又告舍利弗有五種法最為難得一者得人身難二者於佛正法得信樂難三者樂於佛法得出家難四者具清淨戒難五者得漏盡難一切衆生於是五法言為難為難得汝等已得又灌頂經云救脫菩白佛言若姓男女其有尫著怵痛惱無救護者我今當勸請諸衆僧七日七夜齊戒一心受持八戒六時行道四十九遍讀是經典勸然七層之燈懸五色續命神幡阿難問言續命幡燈法則云何神幡五色四十九尺燈亦復爾七層之燈一層七燈燈如車輪若遭厄難閉在牢獄枷鎖著身亦應造立幡燈放諸雜類衆生至四十九可得過度危之難不為諸橫惡鬼所持又三千威儀云然燈有五事一當持淨巾拭中外令淨二當作淨炷三當自作麻油四著膏不得令滿亦不得令少五當護令堅莫懸妨人行道又五百問事云續佛光明晝不得滅佛無明暗以本無言念齊限故滅有罪依道宣律師感通記云律師問天人曰其蜀地漢州三學山寺空燈常照因何而有答曰山有菩薩寺迦葉佛正法時初立有歡喜王菩薩造之寺名法燈自彼至今常明空表有小菩薩三百人斷粒遐齡常住此山此燈又是山神李特續后供養特舊蜀王故正月處處然燈以供佛寺普廣經云若四輩男女若臨終時若已過命於其亡日造作黃幡懸著剎上使獲福德離八難苦得生十方諸佛淨土幡蓋供養隨心所願至成菩提幡隨風轉破碎都盡至成微塵幡一轉時輪王位乃至吹塵小王之位其報無量然燈供養照諸幽冥苦痛衆生蒙此光明得互相見緣此福德彼衆生悉得休息北齊時有仕人姓梁甚豪富將死謂其妻子曰吾平生所愛奴馬皆使用日久稱人意吾以為狥不然無所乘也及家人以囊盛土壓奴殺之馬猶未殺奴死四日而蘇說云當不覺去忽至官府門門人因留止在門所經一宿明旦見其亡主被鎖兵守衛入官所見奴謂曰我謂死人得使奴婢故遺言喚汝今各自受其苦全不相關今當白官放汝言畢而入奴從屏外窺之見官問守衛人曰昨日壓脂多少乎對曰得八斗官曰更將去壓取一斛六斗主則被壓牽出竟不得言明旦又來有善色謂奴曰今當為汝白也又入官問得脂乎對曰不得官問何以主司曰此人三日家人為請僧設會每聞經唄聲鐵梁輒折故不得也官曰且將去主司白官請官放奴即喚放俱出門主遣傳語其妻子曰賴汝等追福獲免大苦然猶未脫更能造經像以相救濟兾因得免自今無設祭既不得食而益吾罪言畢而別奴遂重生而具言之家中果以其日設會於是傾家追福合門練行唐括州刺史樂安任義方武德年中死經數日而蘇自云被引見𨶒羅王王令人引示地獄之處所說與佛經不又云地下晝夜昏暗如霧中行于時其家以義方心上少有溫氣遂即請僧行道義方乃於地下聞其讚唄之聲王檢其案謂之吏曰未合即何因錯追遂放令歸義方出度三關關吏皆睡送人云但尋唄聲當即到舍見一大坑當道意欲跳過遂落坑中應時即起論說地獄畫地成圖其所得俸祿皆造經像曾寫金剛般若千餘部義方自說集經云忉利天城東照明園中有佛髮塔城南粗澀園中有佛衣塔城西歡喜園中有佛鉢塔城北駕御園中有佛牙塔如小未曾有經云佛告阿難若有一人盡四天下滿中草木皆悉為人得四道果及辟支佛盡壽四事供養所須具足至滅度後一一起塔香華幢幡寶蓋供養復造帝釋大莊嚴殿用八萬四千寶柱八萬四千寶窗八萬四千天井寶八萬四千樓櫓館閣四出圍繞衆寶校飾若有善男子善女人作如上百千億大莊嚴殿用施四方僧其福雖多然不如有人於佛般涅槃後以如芥子舍利起塔大如庵摩勒果其剎如針上施槃蓋如酸棗葉若佛形像如麥大勝前功德滿足百倍不及一千倍萬倍百千萬倍所不能及不可稱量阿難當知如來無量功德戒分定分智慧分解脫分無量功德有大神通變化及六波羅蜜如是等無量功德三千威儀云繞塔有五事一低頭視地二不得蹈蟲三不得左右顧視四不得唾塔前地上五不得中住與人語像法决疑經云造新不如修故作福不如避禍斯言驗矣或有村坊塔寺損故伽藍堂殿朽壞舍屋崩摧席扇蓬戶靡隔𤎆塵甕牗茅茨無掩霜露是以門牆雕毀糞穢盈階路絶人踪僧徒漂寄不修不𩛙日就衰造罪造𠎝無時暫捨夜暗燈燭本自無聞晝日幡元來非見堂絶梵唄爐停海岸遂使惡鬼效靈善神捨衛伽藍無固直為僧徒慢惰佛法既衰亦由白衣無敬此而不憂更欲何求三千威儀云掃塔上有五事一不得著履上二不得背佛掃塔三不得取上善土持下棄四不得下佛像上故五當旦過澡手自持淨巾還拭佛像又增一經云掃佛塔有五法一水灑地二除去瓦石三平正其地四端意掃地五除去穢惡地既淨已隨能持一枝香散布地上供養得福無量普廣經云四輩弟子若行齊戒心當存想請十方僧不擇善惡持戒毀戒高下之行到諸塔寺請僧之時僧次供養無別異想其福最多無量無邊若值羅漢四果道人及大心者緣此功德受福無窮一聞說法可得無上涅槃灌佛形像經云佛告大衆世人多有發意求所願者布施之日不計多少趣使充饒事業畢竟有肴饌噉食不盡皆當與守寺中持法沙門衆僧自共分之以出物時當望出福不應各各競分歸與妻子是為種𣗳石上根株焦盡終無生時今以布施者餘福重以施僧是為施一得萬倍報食施獲五福報經云佛告諸比丘當知食以節度受而不損佛言人持飯施人有五功德令人得道智者消息意度弘廓則獲五福何等為五一曰施命二曰施色三曰施力四曰施安五曰施辨何謂施命人不得食時顏色憔悴不可顯示不過七日𡘤忽壽終是故智者則為施食其施食者則為施命其施命者世世長壽生天世間壽命延長不中夭傷自然福報財富無量是謂施命何謂施色人不得食時顏色憔悴不可顯示是故智者則為施食其施食者則為施色其施色者世世端坐生天世間顏色暐曄人見歡喜稽首作禮是為施色何謂施力人不得食時身意弱所作不能是故智者則為施食其施食者則為施力其施力者世世多力生天人間力無等雙出入進止力不耗減是為施力何謂施安人不得食時心愁身危坐起不定不能自安是故智者則為施食其施食者則為施安其施安者世世安隱生天人間不遇衆殃其所到處常遇賢良財富無量不中夭傷是為施安何謂施辨人不得食時身意弱口不能言是故智者則為施食其施食者則為施辨口說流利無所窒礙慧辨通達生天世間聞者歡喜靡不首聽採法言是為五福食之報也增一阿含經云施有五事名為應時一遠來二遠去三病時四冷熱五初得果蓏若得新先與持戒精進人然后自食又施有三法一食至寺名上就舍受養名中造舍乞施發心供養名下毗羅三昧經世尊為惠法菩薩說云食有四種旦天食時午法食時暮畜生食時夜鬼神食時佛斷六趣因令同三世佛故日午時是法食時也過此以後同於下趣非上食時故曰非時也十誦律云唯天得過中食無罪摩德勒伽問頗有非時食不犯耶答曰有若住北單越用彼食時不犯餘方亦爾若在𨶒浮日正午時北方是夜半東方是日沒西方是日出餘方互轉可知又多婆論云釋時有四一始從日出乃至日中其明轉熾名之為時從中已後至後夜分其明滅沒故名非時二從旦至中是作食時乞不生惱故名為時從中以後至于夜分是俗人燕會游戲之時入村乞食多有觸惱故名非時三從旦至中俗人作務淫亂未發乞不生惱故名為時從中已後事務休息淫戲言笑入村乞食喜被誹謗故名非時四從旦至中是乞食時得食濟身寧心修道事順應法故名為時從中已後宜應修道非乞食時故名非時增一阿含經云施中上者不過法施業中上者不過法業恩中上者不過法恩婆多論云比丘受食凡有五意一為斷盜因緣故自取而食亦同盜相二為作證明故倘有失脫不干比丘三為止誹謗故出家自取非是高勝四為成少欲知足故若當不受非同儉素五為生他信敬心故見受而食外道生信如昔有比丘與外道共行止一𣗳下𣗳上有果食時將到外道語比丘云上𣗳取果比丘言我戒法中𣗳過人不應上又語比丘言何不搖𣗳取果比丘言我戒法中不得自搖𣗳落果外道聞已自上𣗳取果擲地與之語比丘言取果食比丘言我戒法中不得不受而食外道下𣗳取果授與比丘外道既見如此於一果上尚有如此法用何况出世之法遂生信敬心知佛法清淨不同外道於是即隨比丘於佛法中出家修道尋即漏盡智度論云說食厭想者當觀是食從不淨生如肉從精血水道生是為膿蟲住處如酥乳酪血變所成與爛膿無異厨人汗垢種種不淨若著口中腦有爛涎二道流下與唾和合然後成味其狀如吐從腹門入地持水爛風動火煮如釜熟麋滓濁下沉清者在上辟如釀酒滓濁為𡱁清者為尿腰有三孔風吹𧸐汁散百脉與先血和合凝變為肉從新肉生脂骨髓從是中生身根從新舊肉合生五情根從此五根生五識五識次第生意識分別取相籌量好醜然後生我我所心等諸煩惱及諸罪業中阿含經云禪以聲為刺世尊亦說以聲為刺所以者何我實如是說禪有刺持戒者以犯戒為刺護諸根者以嚴飾身為刺修習惡露者以淨相為刺修習慈心以恚為刺離酒者以飲酒為刺梵行者以見女色為刺入初禪者以聲為刺入第二禪者以覺觀為刺入第三禪者以喜為刺入第四禪者以入出息為刺入空處者以色想為刺入識處者以空處想為刺入無所有處者以識處想為刺入無想處者以無所有處想為刺入想知滅定者以想知為刺復有三刺欲刺恚刺愚癡刺此三刺者漏盡阿羅訶已斷已知絶根本滅不復生是為阿羅訶無刺白澤圖曰廁之精名曰𠋣衣青衣持白杖知其名呼之者除不知其名則死又築室三年不居其中有滿財長二尺見人則掩面見之有福又築室三年不居其精名忽長七尺見者有福又築室三年不居其中有小兒長三尺而無髮見人則掩鼻見之有福又火之精名曰必方狀如鳥一足以其名呼之則去又木之精名彭侯狀如黑狗無尾可烹而食之又千載木其中有蟲名曰賈詘狀如豚有兩頭烹而食之如狗肉味又上有山林下有川泉地理之間生精名曰必方狀如鳥長尾此隂陽變化之所生又玉之精名岱委其狀如美女衣青衣見之以桃七刺之呼其名則得之又金之精名曰倉𠹔狀如豚居人家使人不宜妻以其名呼之則去又水之精名曰罔象其狀如小兒赤目黑色犬耳長爪以索縛之則可得烹之吉又故門之精名曰野狀如侏儒見之則拜以其名呼之宜飲食又故澤之精名曰冕其狀如一身兩頭五采文以其名呼有使取金銀又故丘墓之精名曰無狀如老役夫衣青衣而操杵好舂以其名呼之使人宜禾又故道徑之精名曰忌如野人行歌以其名呼之使人不迷又故車之精名曰寧野狀如轀車見之傷人目以其名呼之不能傷人目又在道之精名曰作器狀如丈夫善眩人以其名呼之則去又故臼之精名曰意狀如豚以其名呼之則去又故井故淵之精名曰觀狀如美女好吹簫以其名呼之則去又絶水有金者精名侯伯狀如人長五尺五綵衣以其名呼之則去又臺屋之精名者兩貴狀如赤狗以其名呼使人目明又左右有山石水生其澗水出流千載不絶其精名曰喜狀如小兒黑色以其名呼之使取飲食又三軍所戰精名曰賔滿其狀如人頭無身赤目見人則轉以其名呼之則去又故水石之精名慶忌狀如人乘車蓋一日馳千里以其名呼之則可使入水取魚又丘墓之精名曰狼鬼善與人𨷖不休為桃𣗥矢羽以鵄羽以射之狼鬼化為飄風脫履捉之不能化也又故市之精名曰問其狀如囤而無手足以其名呼之則去又故室之精名曰孫龍狀如小兒長一尺四寸衣黑衣赤幘大冠帶劍持㦸以其名呼之則去又山之精名狀如鼓以其名呼之可使取虎狼豹又故牧弊池之精名曰髠頓狀如牛無頭見人則逐人以其名呼之則去又夜見堂下有兒被髮走物惡之精名曰溝以其名呼之則無又百歲狼化為人女名曰知女狀如美女坐道𠊓告丈夫曰我無父母兄弟若丈夫取為妻經年而食人以其名呼之則逃走去又故溷之精名曰𤰞狀如美女而持鏡呼之知愧則去也修行道地經云昔有國王選擇一國明智之人以為輔臣王欲試之欲知何如以重罪加之勑告臣吏盛滿鉢油而使擎之從北門來至于南門去城二十里園名調戲今將到彼若墮一滴便級其頭不須啓問爾時羣臣受王重教盛滿鉢油以與其人兩手擎之甚大愁憂縱有車馬觀者填道若見是非而不轉移縱有親妻子來逼其人專心不左右視縱有合國觀者擾攘其人心端不見衆庶縱有玉女國地無雙歌舞相逼見者皆喜其人一心擎鉢志不動轉亦不觀察妄起片心專精擎鉢不聽其言於是頌曰巧便而安庠其舞最巧妙一切人貪樂辟如魔之后能動離欲者何况於凡人來往其邊擎鉢心不傾縱有象㬥馬奔城中失火焚燒百姓展轉相呼教言避火莫墮坑塹官兵悉來一時救火其人一心擎鉢一滴不遺縱有天雷地動猛風亂起折樹塵飛掣電礔礰禽獸墮落人畜驚喚專心念油其人不聞爾時擎油至彼園觀一滴不墮諸臣啓王具陳斯事王聞嗟歎此人難及人中之雄不顧萬事其王歡喜立為大臣行道行者御心如是雖有諸惡淫怒癡來擾亂諸根內察外防攝心不散三昧定意亦復如是於是頌曰如人擎油鉢不動無所棄妙慧意如海專心擎油器若人欲學道執心當如是意懷諸德明皆除一切瑕若干之色欲而興於怒癡有志不放逸寂滅而自制人身有疾病醫藥以除之心疾亦如是四意止消之雜阿含經云爾時世尊告諸比丘辟如鐵丸投著火中與火同色盛著劫貝錦中云何比丘當連然否比丘白佛如是世尊佛告比丘愚癡之人依聚落住晨朝著衣持鉢入村乞食不善護身不守根門心不繫念若見年少女人不正思惟取其色相起貪欲心欲燒其心欲燒其身身心燒已捨戒退減是愚癡人長夜當得非義饒益是故比丘當如是學善護其身守諸根門繫念入村又雜阿含經云爾時世尊告諸比丘辟如木杵常用不止日夜消減如是比丘從本已來不閉根門食不知量初夜後夜不勤覺悟修習善法當知是輩終日損減不增善法如彼木杵雜譬喻經云昔有鱉遭遇枯旱湖澤乾竭不能自致有食之池時有大鶴來住其邊鱉從求哀乞相濟度鶴銜之飛過都邑鱉不默聲問此何等如是不止鶴便應之口開鱉墮人得屠食夫人愚頑不謹口舌其譬如是中阿含經云爾時有一異學是尊者薄拘羅未出家時親善朋友往詣薄拘羅所請問其義薄拘羅因為說之我於正法律中學道以來八十年未曾起欲想我持糞掃衣來已八十年亦無功高想亦未曾憶受居士衣未曾割截作衣未曾倩他比丘作衣未曾用針縫衣未曾持針囊乃至一縷我乞食來已八十年亦無起功高想亦未曾受居士請亦未曾超越乞食未曾從大家乞食於中當得淨好極妙豐饒食噉含消未視女人靣未曾入比丘尼坊中未曾憶與比丘尼問訊乃至道路亦不共語未曾畜沙彌未曾憶為白衣乃至四句偈未曾有病乃至彈指頃頭痛者未曾憶服藥乃至一片訶梨勒我結跏趺坐於八十年未曾𠋣壁𠋣樹我於三日夜中得三達證我結跏趺坐而般涅槃是為尊者薄拒羅未曾有法三千威儀云欲上牀有五事一當徐踞牀二不得匍匐上三不得使牀有聲四不得大拂牀席使有聲五洗足未淨當拭之齊梁州薛河寺釋僧遠不知何人為性疏誕不修細行好逐流宕歡宴為住以齊武平三年夢見大人切責之曰汝是出家人靣目如此放縱造惡何不取鏡自照遠忽驚悸流汗至曉以盆水自照乃見眼邊烏點謂是垢污便洗拭之眉毛一時隨手落盡因自責遂改常習反形易性弊衣破履一食長齊遵奉律儀昏曉行悔悲淚交注經一月日又夢前人含笑謂曰知過能改是謂智人赦汝前𠎝勿復相續忽驚喜覺流汗遍身靣目津潤眉毛漸出遠於一身頻感兩報信知三世苦樂不虛自後竭情時不暫怠密跡金剛力士經云阿闍世王問佛言菩薩仁和為有幾法往反周旋常存和雅不興粗心佛言菩薩仁和有八事法何謂為八一志性質直而無諛諂二性行和雅常無僞三心存淳熟永無虛妄四心行堅要亦無劣五無迷惑志於仁和六為世衆祐受異德行七心行了達而無所著八思惟罪福心無所念是為八事如雜寶藏經云佛言過去有二國王一是迦尸國王二是比提醯國王比提醯王有大香象以香象力摧伏迦尸王軍迦尸王作是念言我今云何當得香象摧伏比提醯王軍時有人言我見山中有一白香象王聞此已即便募言誰能得香象者我當重賞有人募言多集軍衆往取彼象象思惟言若我遠去父母盲老不如調順往至王所爾時衆人便自將香象向王邊王大歡喜為作好屋具被踏蹬敷著其下與諸伎女彈琴鼓瑟以娛樂之與象飲食不肯食之時守象人來白王言象不肯食王自向象所上古畜生皆能人語王問象言汝何故不食象答王言我有父母年老眼盲無與水草父母不食我云何食象白言我欲去者王諸軍衆無能我但以父母盲老順王來耳王今見聽我去供養父母終其年壽自當還來王聞此語極大歡喜我等便為人頭之象此象乃是象頭之人先迦尸國人惡賤父母無供養心因此象故王即宣令一切國內若不孝養父母者當與大罪尋即放象還父母所供養父母隨壽長短父母喪亡還來王所王得白象甚大歡喜即時莊嚴欲伐彼國象語王言莫與𨷖諍凡𨷖諍法多所傷害王言彼欺陵我象言聽我使往令彼怨敵不敢欺侮王言汝若去者或能不還答言無能遮我使不還者象即於是往彼國中比提醯王聞象來至極大歡喜自出往迎既見象已而語之言即住我國象白王言不得即住我立身已來不違言誓先許彼王當還其國汝二國王應除怨惡自安其國豈不快乎即說偈言得勝增長負則益憂苦不諍勝負者其樂最第一爾時此象說斯偈已即還迦尸國從是以後二國和好爾時迦尸國王者今波斯國王是比提醯王者今阿闍世王是爾時白象今我身是也由我爾時孝養父母故令多衆生亦孝養父母爾時能使二國和好今日亦爾齊鄴東大覺寺釋僧範姓李平鄉人也戒德清高守禁無虧常宿他寺意欲聞戒至于十五日說戒之夜衆議共停說戒乃為法集有僧升座將欲竪義敘云竪論法相深會聖言布薩常聞擊難為勝忽見一人形高丈餘貌甚雄峻壅聳驚人來到座前問竪義者今是何日答曰是布薩日神即以手搨之曳之下座委頓垂死次問上座問答同前搨還將死陵害二三上座已神還掉臂而出當時道俗共覩非一範師既見斯異乃自勤力兼䇿大衆至于一生無敢說法縱有病重不堪勝輿請僧就病人所恭敬說戒闔境僧尼承斯徵誡至布薩日亦不虧法敬師經云一日三時應參師進止若參師來不見時應持土塊草木以為記天時若熱日別三時以扇扇師若有比丘於彼師所或和尚邊不生敬心導說長短於將來世別有一小地獄名為拒撲當經是中墮彼處已一身四頭身體俱燋於彼獄處復有諸蟲名曰䥫𭉨常噉舌根若從他聞一四句偈於各千劫取彼和尚阿闍𥠖等荷擔肩上或時背負頂戴亦未能報也又六度集經云昔者菩薩身為鶴鳥生子有三時國大旱無以食之自裂腋下肉以濟其命三子疑曰斯肉氣味與母身氣相似無異得無吾母以身肉飼吾等乎三子愴然有悲愍之情又曰寧吾命不損母體也於是閉口不食母覩不食而更索焉天神歎曰母慈惠難喻子孝希有也諸天祐之願即從心佛告諸比丘鶴母者吾身是也三子者舍利弗目連阿難是也菩薩慈惠度無極行布施如是大般若經第四百四十三若有問言誰是知恩報恩者應正答言佛是知恩能報恩者何以故一切世間知恩報恩無過佛故涅槃經云阿難比丘說半梵行名善知識佛言不爾具足梵行乃名善知識又云善知識如法而說如說而行云何名為如法而說如法而行自不煞生教人不煞生乃至自行正見教人行正見若能如是則得名為真善知識自修菩提亦能教人修行菩提以是義故名善知識自能修行信戒布施多聞智慧亦能教人修行信戒布施多聞智慧復以是義名善知識善知識者有善法故何等善法所作之事不求自樂常為衆生而求於樂見他有過不訟其短口常宣說純善之事以是義名善知識善男子如空中月從初一日至十五日漸漸增長善知識者亦復如是令諸學人漸遠惡法增長善法善男子若有親近善知識者本未有定慧解脫解脫知見即便有之未具足者則得增廣又云善友當觀是人貪欲瞋恚愚癡思覺何者偏多若知是人貪欲多者則應為說不淨觀法瞋恚多者為說慈悲思覺多者教令數息著我多者當為分析十八界等聞已修行次第獲得四念處觀身受心法得是觀已次第復觀十二因緣如是觀已次得暖法從得暖法乃至漸得羅漢辟支佛果菩薩大乘佛果等依此而生更無疑滯自利利他不加水乳是名真善知識法師之位如尸迦羅越六向拜經云惡知識有四輩一內有心外強為知識二於人前好言語背後說人惡三有急時於人前愁苦背後歡喜四外如親厚內興謀惡知識復有四輩一小侵之便大怒二有倩使之便不肯行三見人有急時避人走四見人死忘棄之不視智度論云何布施生尸波羅蜜菩薩思惟衆生不知布施后世貧窮以貧窮故劫盜心生以劫盜故而有煞害以貧窮故不足於色色不足故而作邪行以貧窮故為人下賤下賤畏他而生妄語如是等貧行十不善道若行布施生有財物不為非法佛說長者子惱三處經云爾時舍衛城有大富長者財寶無數家無親子恐終後沒官夫婦禱祠歸命三寶精勤不懈便得懷軀婦人𭶑者有五事應知一知夫壻意二知夫壻念不念三知所因懷軀四別知男女五別知善惡是婦報長者我已懷軀長者歡喜月滿生男加五乳母供養抱持長大索得好婦其兒夫婦行園園中有樹名曰無憂華色鮮白絮弱緋色婦語夫言欲得此華夫便上樹為取此花樹枝細劣即時摧折兒便墮死父母聞之奔趨抱頭摩娑占視永絶不蘇父母悲哀五內摧傷衆客見之亦代哀痛佛與阿難因入城見愍獨一子而墮樹死佛告長者人生有死物成有敗時至命盡不可避藏捐去憂念勿復憂戚佛語長者此兒本從忉利天上壽𥁞而生卿家卿家便生龍中龍中金翅鳥王即取噉之三處父母一時共啼哭為是誰子佛即說偈言天上諸天子亦非為卿子復非諸龍子生諸因緣無常譬如幻一切不久立譬如若過客佛語長者死不可離去不可追長者白佛此兒宿命罪福云何佛言此兒前世好喜布施尊敬於人緣此福德生豪富家喜獵傷害令身命短罪福隨人如影隨形長者踊躍逮得法忍如十住毗婆沙論云於此家中父母兄弟妻子眷屬車馬等物唯增貪求無有厭足家是難滿如海吞流家是無足如火焚薪家是無息覺觀相續家是苦性如詐親家是障礙能妨聖道家是𨷖亂共相違諍家是多嗔呵責好醜家是無常雖久失壞家是衆苦馳求守護家是疑處猶如賊家是顛倒貪著假名家是伎人種種妄飾家是變異貪必離散家是假借無有實事家是眠夢富貴則失家如朝露須變滅家如蜜滴其味甚少家如𣗥叢欲𣗥傷人家如鐵觜蟲覺觀常唼如是等患不可具述是故在家菩薩當如是觀知其家過在家妻子眷屬奴婢財物等不能作救作歸非我善友是故宜當急離捨之又無始以來一切衆生於六道中互為父子親踈何定故偈云無明蔽慧眼數數生死中往來多所作更互為父子貪著世間樂不知有勝事怨數為知識知識數為怨是故我方便莫生憎愛心若起憎愛心不能通達法唐京城真寂寺沙門慧如少精勤苦行師事信行信行亡後奉遵其法隋大業中因坐禪修定遂七日不動衆皆歎異之以為入三昧也既而慧如開目涕泣交流僧衆怪問之答曰火燒腳痛待視瘡畢乃說衆皆怪問慧如曰被𨶒羅王請行道七日滿王問須見先亡知識否如答欲見二人王即遣喚一人唯見龜來䑛慧如足目中淚出而去更一人者云罪重不可喚令就見之使者令慧如至獄門門閉甚固使呼守者有人應聲使者語慧如師急避道莫當門立如始避而門開大火從門流出如鍛星迸著如被燒之舉目視門門已閉訖竟不得相見王施絹三十匹固辭不許云已遣送後房衆僧爭往房視之則絹在牀矣其燒瘡大如錢百餘日乃愈至武德初卒真寂寺即今化度寺是唐京都西市北店有王會師者其母先終服制已畢至顯慶二年內其家乃産一青黃母狗會師妻為其盜食乃以杖擊之數下狗遂作人語曰我是汝姑新婦杖我大錯我為嚴酷家人過甚遂得此報今既被打羞向汝家因即走出會師聞而涕泣抱以歸家而復還去凡經四五會師見其意止乃屈請市北大街中正是已店北大牆後作小舍安置每日送食市人及行客就觀者極衆投餅與者不可勝數此犬𢘆不離此舍過齊時而不肯食經一二歲莫知所之雜阿含經云爾時世尊手捉團土大如梨果告諸比丘云何我手中團土為多大雪山中土石為多諸比丘白佛言世尊手中土少耳彼雪山土石甚多乃至算數不得為比佛告諸比丘如是衆生知四聖諦苦集滅道者如我所捉團土不如實知者如大雪山土石爾時世尊以爪甲擎土告諸比丘於意云何我甲上土為多此大地土多諸比丘白佛言世尊世尊甲上土甚少耳此大地土甚多乃至算數不可為比佛告諸比丘若諸衆生形可見者如甲上土其形微細不可見者如大地土如是陸地如是水性亦爾如得人道者如甲上土墮非人者如大地土如是生中國者如甲上土生邊地者如大地土如是成聖慧眼者如甲上土不成聖者如大地土如是知法律者如甲上土不知法律者如大地土如是知其父母者如甲上土不知有父母者如大地土如是知受齊戒者如甲上土不知受齊戒者如大地土如是從地獄畜生餓鬼命終生人中者如甲上土從地獄命終還生地獄畜生餓鬼者如大地土如是衆生從地獄畜生餓鬼命終生天上者如甲上土還生地獄畜生餓鬼者如大地土如是從天命終還生天上者如甲上土從天命終還生地獄畜生餓鬼者如大地土百喻經云昔有一人至婦家舍見其搗米便往其所偷米唵之婦來見人欲共其語滿口中米都不應和羞其婦故不肯棄之是以不語婦怪不語以手摸看謂其口腫語其父言我夫始來卒得口腫都不能語其父即便喚醫治之時醫言曰此病最重狀似石壅以刀决之可得瘥耳即便以刀决破其口米從中出其事彰露世間之人亦復如是作諸惡行犯於淨戒覆藏其過不肻發露墮於地獄畜生餓鬼如彼愚人以小羞故不肻吐米以刀决口乃顯其過智度論云一切諸法皆是虛誑衆生愚癡不識親疏瞋罵加害乃至奪命起此重罪故墮三塗受無量苦譬如山中有一佛圖彼中有一別房房中有鬼來恐惱道人故諸道人皆捨房去有一客僧來維那處分令住此室房而語之言此房中有鬼神喜惱人能住中者住客僧自以持戒力多聞故言小鬼何所能為我能伏之即入房住暮更有一僧來求此住處維那亦令在此房住亦語有鬼惱人其人亦言小鬼何在能為我當伏之先入者閉戶端坐待鬼後來者夜暗打門求入先入者謂為是鬼不為開戶後來者極力打門在內道人以力拒之外者得勝排門得入內者打之外者亦打至旦相見乃是舊同學識已各相愧謝衆人雲集笑而怪之衆生亦復如是五陰皆虛無我無人取相𨷖諍橫加毒害若披解在地但有骨肉無人無我是故菩薩語衆生言汝等莫於根本空中𨷖諍人身尚不可得何况值佛如婆多論云波羅提木義之戒五道而言唯人道得戒餘四不得如天道以著樂深重不能得戒如昔一時大目連以弟子有病上忉利天以問𦒿婆正值諸天入歡喜園爾時目連在於路側立待一切諸天無顧看者唯𦒿婆後至顧見目連向舉一手乘車直過目連自念此本人間是我弟子今受天福以著天樂都失本心即以神力制車令住𦒿婆下車禮目連足目連種種因緣呵責𦒿婆答目連曰以我人中為大德弟子是故舉手問訊頗見諸天有爾者不有時目連勸誡釋提桓因佛世難值何不數數相近咨受正法帝釋欲解目連意故遣使敕一天子令來反覆三喚猶故不來後不應已而來帝釋白目連曰此天子唯有一天女一妓樂以自娛樂以染欲情深雖復命重不能自割故不肯來况作天主種種宮觀無數天女須食自然百味千妓樂以自娛樂視東忘西雖知佛世難遇正法難聞而以染樂纏縛不得自在知復如何三塗苦難無緣得戒人中唯三天下得戒北鬱單越無有佛法不得戒以福報障并愚癡故不受聖法涅槃經云爾時十仙外道欲共佛捔試神力阿闍世王報外道云汝等欲以手瓜抱須彌山欲以口齒齚齧金剛諸大士辟如愚人見師子王饑時睡眠而欲窹之如人以指置毒蛇口如欲以手觸灰覆火汝等今者亦復如是善男子辟如野狐作師子吼猶如蚊子共金翅烏捔行遲疾如兔渡海欲盡其底汝等今者亦復如是汝等今者興建是意猶如飛蛾投於火聚汝隨我語不復更說百喻經云過去之世有一山羌偷王庫物而遠逃走爾時國王遣人四出推尋捕得將至王邊王即責其所得衣處山羌答言我衣乃是祖父之物王遣著衣實非山羌本所有故不知著之應在手者著於上應在腰者反著頭上王見賊已集諸臣等共祥此事而語之言若是汝之祖父已來所有衣者應當解著云何顛倒用上為下以下為上以不解故定知汝衣必是偷得非汝舊物借以為譬王者如佛寶藏如法愚癡羌者猶如外道窮偷佛語著己法中以為自有然不解故布置佛法迷惑上下不知法相如彼山羌得王寶衣不識次第顛倒而著亦復如是傳云時有沙門迦攝摩騰竺法蘭位行難測志存開化蔡愔使遠請騰東行不守區域隨至𨿅陽曉喻物情崇明信本帝問騰曰法王出世何以化不及此答曰迦毗羅衛者三千大千世界百億日月之中心也三世諸佛皆在彼生乃至天龍鬼神有願行者皆生於彼受佛正化咸得悟道餘處衆生無緣感佛佛不往也佛雖不往光明笈處或五百年或一千年或一千年外皆有聖人傳佛聲教而化導之邪惑問曰夫父母之體不可毀傷何故沙門剃髮去髭反先王之道失忠孝之義耶方外對曰若夫事君親而盡節雖殺身而稱仁𧇊忠孝而偷存徒全膚而非義論美見危而致命禮防臨難而苟免何得一槩而避死傷雷同而顧膚髮割股納肝為傷甚矣剃鬚落髮其毀微焉立忠不顧其命論者莫之求道不愛其毛何獨以為過湯恤蒸民尚焚軀以祈澤墨敦兼愛欲磨足而至頂况夫上為君父深求福利鬚髮之毀何足顧哉且夫聖人之教有殊途而同歸君子之道或反經而合義則泰伯其人也廢在家之就養託採藥而不歸棄中國之服依剪髮以為飾反經悖亂莫甚於斯然而仲尼稱之曰太伯可謂至德矣其何故也雖迹背君親而心忠於家國形𧇊百越而德全乎三讓故泰伯棄衣冠之制而無損於至德沙門捨縉紳之容亦何傷於妙道雖易服改貌違臣子之常儀而信道歸心願君親之多福苦其身意修出家之衆善遺其君父以歷劫之深慶其為忠孝不亦多乎邪惑問曰天道無親頓成虛闡禍淫福善胡其爽歟因何捐替者享遐齡崇敬者無終厥壽計應蘊福延慶積惡招何乃進退矛盾情狀皎然去取自乖若為酬對方外對曰道教浮疏詎明三報儒宗齷齪但敘一生故仲尼答季路曰生與人事汝尚未知死與鬼神爾焉能事袁宏後漢曰道家者流出於老子以清虛淡泊為主務善嫉惡為教畜妻子用符書禍福報應在一生之內此並區中之近唱非象外之遐談所以荀悅碩疑史遷深惑至如唐虞上聖乃育朱均瞽叟下愚是生有舜顏回大賢而夭絶商臣極惡而㣧昌盜跖縱暴而福終夷齊至仁而餓死張湯酷吏七世瓔比干正臣一身屠戮如此流例胡可勝言渠或致疑故常情耳所以我之種覺獨號正遍知遐唱二生廣敷三報欲使繁疑霧捲夙滯霞披玉諜周陳金言備顯故經云有業現苦有苦報有業現苦有樂報有業現樂有樂報有業現樂有苦報或餘福未盡惡不即加或宿殃尚存善緣便發如灰覆火豈得稱無若暗尋聲當知必有且夫善惡無爽狀麟鬬以日虧報應有歸等鯨亡而星現但察感通之分足明善惡之徵也雜寶藏經云有一鬼言我𡮢為天祠有狗利牙赤白來噉我肉惟有骨在風來吹起肉還復生狗復來噉此苦何因目連答言汝前世作天祠主常教衆生煞羊以血祠天汝自食肉是故今日以肉償之復有一鬼言我腹極大如甕咽喉手其細如針不得飲食何因此苦目連答言汝前世時作聚落主自恃豪貴飲酒縱橫輕欺餘人奪其飲食餓困衆生復有一鬼言我常趣溷欲噉食糞有大羣鬼捉杖驅我不得近廁口中爛臭饑困無賴何因如此目連答言汝前世時作佛圖主有諸白衣供養衆僧供辦食具汝以粗供設客僧細者自食復有一鬼言我常有七枚熱鐵丸直入我口入腹五臟焦爛出腹還入何因故受此罪目連答言汝前世時作沙彌行果蓏子到自師所敬其師故偏心多與實長七枚復有一鬼言我癭丸極大如甕行時擔著肩上住則坐上進止患苦何因故爾目連答言汝前世時作市令常以輕稱小斗與他重稱太斗自取常自欲得大利於己侵尅餘人復有一鬼言我常有熱鐵針入出我身受苦無賴何因故爾目連答言汝前世時作調馬師或作調象師象馬難制汝以鐵針刺又時牛遲亦以針刺復有一鬼言我常有旋風回轉我身不得自在隨意東西心常惱悶何因故爾目連答言汝前世時常作卜師或時實語或時妄語或誑人心不得隨意復有一鬼言我常有熱鐵籠籠絡我身焦熱惱何因受此目連答言汝前世時常以羅網掩捕魚鳥復有一鬼言我常以物自𫎇籠頭亦常畏人來煞我心常怖懼不可堪忍何因故爾目連答言汝前世時淫犯外色常畏人見或畏其夫捉縛打殺或畏官法戮之都市恐怖相續復有一鬼問言我受此身肩上常有銅瓶滿中洋銅手足一杓取自灌頭舉體焦爛如是受苦無數無量有何罪答言汝前世時出家為道典僧飲食以一酥瓶私著餘處有客道人來者不與之去已出酥行與舊僧此酥是招提僧物一切有分此人藏隱雖與不等由是緣故受此罪也譬喻經云昔外國有人死魂還自鞭其尸𠊓人問曰是人已死何以復鞭報曰此是我故身為我作惡見經戒不讀偷盜欺詐犯人婦女不孝父母兄弟惜財不肻布施今死令我墮惡道中勤苦毒痛不可復言是故來鞭之耳依無量壽經云憍梵波提過去世曾作比丘於他粟田邊摘一莖粟觀其生熟數粒墮地五百世作牛償之隋楊州卞士瑜者父在隋以平陳功授儀同慳吝常雇人築宅不還其價作人求錢卞父鞭之皆怒曰若實負我死當與我作牛須之間卞父死其年作牛孕産一黃犢腰有黑文橫絡周匝如人腰帶右有白文斜貫大小正如象笏形牛主呼之曰卞公何為負我犢即屈前以頭著地瑜以錢十萬贖之牛主不許死乃𭣣葬瑜為臨自說之爾問曰佛前獻佛食若用常住僧物造作者過事已後定入常住僧此事不疑未知外有施主獻盆獻供種種雜事等此屬何處答曰此量施主情有通局若施主依經造作元為救存亡眷屬事藉十方凡聖坐夏自恣之僧方能救亡親得離三塗清升人天所以獻佛之後所有飲食餘長及生供米之屬等並入常住僧用以還供僧食自外雜物錢財衣物等並入夏坐客主同分故四分下文夏食不應分聽分夏衣及自恣衣等長阿含經云一切人民所居舍宅皆有鬼神無有空者街巷道陌屠膾市肆及諸山塜皆有鬼神無有空處凡諸鬼神皆隨所依即以為名若人初生皆有鬼神隨逐擁護若人欲死鬼收精氣行十惡人若百若千共一神護行十善者猶如國王以百千人而侍衛之又十方譬喻經云天上天下鬼神知人壽命罪福當至未至不能活人不能殺人不能使人富貴貧賤但欲使人作惡犯殺因人衰耗而往亂之語其禍福令人向欲得設祠祀耳故知空祭鬼神欲求現福難可得力也雜寶藏經云昔有老公其家巨富而此老公思得肉食詭作方便指田頭樹語諸子言令我家業所以諧富由此樹神恩福故爾今日汝等宜可羣中取羊以用祭祀時諸子等承父教敕尋則殺羊禱賽此樹即於樹下立天祀舍其父後時壽盡命終行業所追還生己家羊羣之中時值諸子欲祀樹神便取一羊遇得其父將欲殺之羊便啞啞笑而言曰而此樹者有何神靈我於往時為思肉故妄使汝祀皆共汝等同食此肉今償罪獨先當之時有羅漢過到乞食見其亡父受於羊身即借主人道眼令自觀察乃知是父心懷惱即壞樹神悔過修福不復殺生又未曾有經云有王白佛言我父先王奉事外道常行布施求梵天福如斯功德生何天耶佛告王曰前王果報今在地獄所以者何不值善時不遇善友無善方便雖修功德不得免罪布施之功不忘失也後罪畢時方當受福當知修福不與罪合先帝大王有五種惡業生地獄中一者傲慢妬弊事無粗細便起鞭罰不忍辱故二者貪受寶貨斷事不平致令天下懷恨故三者游獵嬉戲苦困人民害衆生所愛命故四者耽著女色得新厭舊撫接不平致恨故五者破戒以此文證故知事邪修福善惡𢘆別苦樂兩報不相雜亂何况利根多聞正信三寶而招苦報慈悲篇敬尋如來設教深尚慈悲禁戒之科殺害為重衆生貪濁愛戀己身形害他命保養自軀由著滋味漁捕百端貪彼甘肥𦊨羅萬種或擎鷹放犬涉山丘擁劍提戈穿窬林藪或綸河海布網江湖香餌釣魚金丸彈鳥遂使輕鱗命弱羽摧年穴罷新胎巢無舊卵既窮草澤命侶游歸於是脂消鼎鑊肉碎砧刀識附𦎟中魂依膾何期此身可重彼命為輕遂喪彼身形養己軀命止存口腹不顧酸傷但為庖厨橫加屠割致使家讎隙遍在冥中債主逐隨滿於空界不善業相以自莊嚴諸惡律儀無時暫捨菩薩為此皺眉大士由茲抆淚但惟四生遞受六道輪回或此身府昔是至親曩世密交今成疏友改形易貌不復相知彼沒此生何由可測但慈悲之道救為先菩薩之懷愍濟為用常應遍游地獄代其受苦廣度衆生施以安樂也大集經云佛言我昔為於一切衆生修菩薩行為此法眼於諸衆生起大慈心捨己身血猶如大海與諸乞者捨頭眼耳如毗福羅山捨鼻舌等如十突盧那捨手等如毗福羅山捨皮施等可覆一𨶒浮提亦捨無量象馬奴婢妻子及以王位國土城邑宮殿村落等與諸乞者於諸佛所受持禁戒而無犯一一佛所無量供養一一佛所稟受無量那由他百千法門受持讀誦善修三昧我亦恭敬無量三乘四果聖人父母師長病苦之者無救護者為作救護無歸依者為作歸依無趨向者為作趨向令其安住我已如是於彼三大阿僧祗劫慈愍一切苦惱衆生故發大堅固勇猛之心久修無上菩提之行今於此盲𡨋世間無大導師儉法之時於如是等諸衆生中發心願成阿耨多羅三藐三菩提欲於三乘菩提令不退轉復願救度三惡衆生安置善道及涅槃樂雜寶藏經云爾時如來被佉陀羅刺刺其足血出不止以種種藥塗不能得差諸阿羅漢於香山中取藥塗治亦復不除十力迦葉至世尊所作是言曰若佛如來於一切衆生有平等心於羅睺羅提婆達多等無有異者血應止即時血止瘡亦平復大悲經云佛告阿難若復有人心住慈善當得十一種功德利益何者為十一種一睡眠得安隱寤則心歡喜二不見惡夢三人非人愛四諸天擁護五毒不能害六刀箭不傷七火所不燒八水所不溺九常得好衣肴膳飲食牀座臥具病瘦湯藥十得上人法十一得身壞命終得生梵天又增一阿含經云爾時世尊告諸比丘有六凡常之力云何為六小兒以啼為力女人以瞋為力比丘以忍為力國王以憍慢為力羅漢以精進為力諸佛以大悲為力是故比丘當念大慈悲力如梵網經云若佛子以慈心故行放生業一切男子是我父一切女人是我母我生生無不從之受生故六道衆生皆是我父母而殺而食者即殺我父母亦殺我故身一切地水是我先身一切火風是我本體故常行放生生生受生若見世人殺畜生時應方便救護解其苦難常教化講菩薩戒救度衆生若父母兄弟死亡之日請法師講菩薩戒經律追福資其亡者得見諸佛生人天上若不爾者犯輕垢罪正法念經云經宿之水若不細觀恐生細蟲若不漉治不飲不用是名細持不殺戒又雜寶藏經云昔有一羅漢道人畜一沙彌知此沙彌𨚫後七日必當命終與假歸家至七日頭敕使還來沙彌辭師即便歸去於其道中見衆蟻子隨水漂流命將欲絶生慈悲心自脫袈裟盛土水而取蟻子置高燥處遂悉得活至七日頭還歸師所師甚怪之尋即入定以天眼觀知其更無餘福得爾以救蟻子因緣之故七日不死得延命長又治故塔亦得延命又治補伽藍墻壁泥孔亦得延命也如大智度論云乃往過去無量阿僧祗劫有大林樹多諸禽獸野火來燒三邊俱起唯有一邊而躡一水衆獸窮逼逃命無地佛言我於爾時為大身多力鹿以前跨一岸以後踏一岸令衆獸蹈背上而度皮肉盡壞以慈悲力忍之至死最後一兔來氣力已喘自強努力忍令得過過已脊折墮水而死如是久有非但今也前得度者今諸弟子是最後一兔須跋是佛世世樂行精進今猶不息𣈆徐榮者琅琊人𡮢至東陽還定山舟人不慣誤墮洄澓中游儛濤波欲沉沒榮無復計唯至心呼觀世音斯須閒如有數十人齊力引船者踊山澓中還得平流㳂江還下日已向暮天大陰暗風雨甚駃不知所向而濤浪轉盛榮誦經不輟口有頃望見山頭有火光赫然回柂趣之徑得還浦舉船安穩既至亦不復見光同旅異之疑非人火明旦問浦中人昨夜山上是何火光衆皆愕然曰昨風雨如此豈如有火理吾等並不見然後了其為神光矣唐武德初中有醴泉縣人姓徐名善才一生已來常修齊戒誦念觀世音經過逾千遍每在京城延興寺玄琬律師所修營功德敬造一切經至武德二年十一月因事還家道逢胡賊被捉將去至豳州南界胡賊凶毒所捉得漢數千人各被反縛將向洪崖差人次第殺之頭落懸崖賢者見前皆殺定知不免唯念觀音剎那不輟次到賢者初下刀時自見下刀及至斫時心不覺惺當殺之時日始在申至于初夜覺身在深澗𣗳枝上坐去岸三百餘步賢者便自私念我何故在此良久始知今日被殺何因不死身全在𣗳便以手摩頂覺項微痛而無損傷即知由念觀音得全身命當時十五日天時月朗其身無衣兼不得食經由數日極覺饑寒旦漸下𣗳循澗東行二里於其澗內拾得一領羊裘及得一緉鞋靺得著免寒復行一里便得一魁桃棗青翠赤白似新摘來可有升餘得食免饑自非觀音神力豈得仲冬得新桃棗既免饑寒得充氣力漸上南坡到南岸上反顧北看遙見賊營數里人畜聲閙猶未眠臥賢者雖到南岸恐賊來趂望家急行可行五十里知賊漸遠身心寧泰在一樹下歇息跏趺誦念身勞日久不覺坐息至於四更忽寤開目見一青狼偉大向賢者前蹲坐將口拄賢者鼻賢者見已還閉目作念云若實我𬽦願食我身以償夙各捨結共發仁慈若是觀音願救弟子令得安泰作此語已開眼觀視不見遺跡當知諸佛慈善根力隨緣感現利益無窮今時有誦不得力者良由輕心復由過現宿惡相資所以難感賢者平安到家并將桃棗呈示道俗知實不虛舊雜譬喻經云昔有六人為伴造罪俱墮地獄同在一釜中皆欲說本罪一人言沙二人言那三人言特四人言涉五人言姑六人言陀羅佛見之笑目連問佛何以故笑佛言有六人為伴俱墮地獄共在一釜中各欲說本罪熱湯沸涌不能再語各一語便回下一人言沙者世間六十億萬歲在泥犁中始為一日何時當竟第一人言那者無有出期亦不知何時當得脫第三言特者咄咄我當用治生不能自制意奪五家分供養三尊愚貪無足今悔何益第四人言涉者言我治生亦不至誠財産屬他為得苦痛第五人言姑者誰當保我從地獄中出便不犯道禁得生天樂者第六人言陀羅者是事上頭本不為心計譬如御車失道入邪折軸車壞悔無所及佛說須摩提女經云爾時羅閲城有長者號曰郁迦有女名須摩提厥年八歲歷世奉敬過去無數百千諸佛積纍功德不可稱計行到佛所頭面禮足𨚫住一面義手白佛欲有所問願為解說佛語須摩提恣所欲問今當為說令汝歡喜須摩提問佛言菩薩云何所生處人見之常歡喜云何得大富有常多財寶云何不為他人所別離云何不在母人腹中常得化生千葉蓮華中立法王前云何得神足從不可計億剎土去到彼間得禮諸佛云何得無讐無侵嫉者云何所說聞者信從踊躍受行云何得無央福所作善行無能壞者云何魔不能得其便云何臨壽終時佛在前立為說經法即令不墮苦痛之處所問如是是時佛語須摩提如汝所問如來義者善哉大快乃如是乎汝若欲聞吾當解說時女即言甚善世尊願樂欲聞佛言菩薩有四事法人見皆歡喜何等為四一瞋恚不起視家如善知識二常有慈心向於一切三常行求索無上要法四作佛形像菩薩復有四事法得大富有何等為四一布施以時二與已倍悅三與後不悔四既與不求其報菩薩復有四事法不為他人所別離何等為四一不傳應說𨷖亂彼此二導愚癡者使入佛道三若有毀敗正法護使不絶四勸勉諸人教使求佛令堅不動菩薩復有四事法得化生千葉蓮華中立法王前何等為四一細搗紅青黃白蓮華合此四種末之如塵使滿軟妙華持是供養世尊若塔及舍利二不令他人起瞋恚意三作佛形像使坐蓮華上四得最正覺便歡喜住菩薩復有四事法得神足從一佛國復至一佛國何等為四一見人作功德不行斷絶二見人說法而不中止三常然燈火於塔寺中四求三眛菩薩復有四事法得無仇無侵嫉者何等為四一於善知識無諛諂心二不慳貪妬他人物三見人布施助其歡喜四見菩薩諸所作為不行誹菩薩復有四事法其所語言聞者信從踊躍受行何等為四一口之所說心亦無異二於善知識常有至誠三聞人說法不生是非四若見他人請令說法不求其短菩薩復有四事法得無央福所作善行疾得淨住何等為四一心意所念常至於善二常持戒三昧智慧三初發菩薩意便起一切智多所度脫四常有大慈愍於一切菩薩復有四事法魔不能得其便何者為四一常念於佛二常精進三常念經法四常立功德菩薩復有四事法臨壽終時佛在前立為說經法令其不墮苦痛之處何等為四一為一切人故具滿諸願二若人布施諸不足念欲足之三見人雜施若有短少便助之四常念供養於三寶爾時須摩提白佛言唯世尊所說四十事我當奉行令不減悉使具足不違一事婆沙論云有一屠兒七生已來常屠不落三塗然生人天往來此由七生已前曾施辟支一食福力故令七生不墮惡道然此人七生已來所作屠罪之業過七生已次第受之無有得脫善惡俱爾地持經云殺生之罪能令衆生墮三惡道若生人中得二種果報一者短命二者多病如是十惡一一皆備五種果報一者殺生何故受地獄苦以其殺生苦衆生故所以身壞命終地獄衆苦皆來切己二者殺生何故出為畜生以殺生無有慈惻行乖人倫故地獄罪畢受畜生身三者殺生何故復為餓鬼以其殺生必緣慳心貪著滋味復為餓鬼四者殺生何故生人而得短壽以其殺生殘害物命故得短壽五者殺生何故兼得多病以殺生違適衆患競集故得多病當知殺生如是苦也地持論云邪淫之罪亦令衆生墮三惡道若生人中得二種果報一者婦不貞潔二者得不隨意眷屬邪淫何故墮於地獄以其邪淫干犯非分侵物為苦所以命終受地獄苦何故邪淫出為畜生以其邪淫不順人理所以出獄受畜生身何故邪淫復為餓鬼以其淫佚皆因慳愛慳愛罪故復為餓鬼何故邪淫婦不貞潔緣犯他妻故所得婦常不貞正何故邪淫不得隨意眷屬以其邪淫奪人所寵故其眷屬不得隨意所以復為人之所奪當知淫佚如是苦也地持論云兩舌之罪亦令衆生墮三惡道若生人中得二種果報一者得弊惡眷屬二者得不和眷屬何故兩舌墮於地獄緣其兩舌離人親愛愛離苦故受地獄苦何故兩舌出為畜生緣其兩舌𨷖亂事同野干受畜生身何故兩舌復為餓鬼以其兩舌亦緣慳嫉罪故復為餓鬼何故兩舌為人得弊惡眷屬緣以兩舌使人朋儔皆生惡故何故兩舌得不和眷屬緣以兩舌離人親好使不和合故當知兩舌如是苦也地持論云嗔恚之罪亦令衆生墮三惡道若生人中得二種果報一者常為一切求其長短二者常為衆人被所惱害何故嗔惱墮於地獄緣此嗔惱恚害苦物受地獄苦何故嗔惱出為畜生緣此嗔惱不能仁恕所以出獄受畜生身何故瞋惱復為餓鬼緣此嗔惱從慳心起慳心罪故復為餓鬼何故瞋惱常為一切求其長短緣此瞋惱不能含容故為一切求其長短何故瞋惱常為衆人之所惱害緣此瞋惱惱害於人人亦惱害當知嗔惱如是苦也地持論云邪見之罪亦令衆生墮三惡道若生人中得二種果報一者生邪見家二者其心諂曲何故邪見墮於地獄緣以邪見惟向邪道及以神俗謗佛法僧不崇三寶既不崇信斷人正路致令遭苦所以命終入阿鼻獄何故邪見復為畜生緣以邪見不識正理所以出獄受畜生報何故邪見復為餓鬼緣此邪見慳心堅著乖僻不捨不捨慳著復為餓鬼何故邪見生邪見家緣此邪見僻習纏心所以為人生邪見家何故邪見其心諂曲緣此邪見不中正故所以為人心常諂曲當知邪見如是苦也如是一一微細衆惡罪業無量無邊皆入地獄備受諸苦非可算數而知且略言耳若能反惡為善即是我師問曰未知何義於初禪中別取梵王於第四禪中別取無想天并五淨居立為三有別於初四禪者有何義耶答曰有以謂彼初禪大梵天者外道人等𢘆計以為能生萬物之本違之則受生死順之則受解脫又彼梵王亦復自計己身能為造化之主是一是常是真解脫如來為欲破彼情見是故別標說為有也第二無想天者謂彼天中悉得定壽五百大劫無心之報外道人等於此不達而復計為真實涅槃是故樂修無想之定求生彼處如來為欲破彼情見是故別標說為有也第三五淨居者於中有彼摩醯首羅天王處外道人等亦復計彼天王能為造化之本歸之則得解脫為破此見是故如來別標說有別說之意義顯斯也正法念經云𨶒魔羅人非是衆生罪人見之謂是衆生手中執持𦦨然鐵鉗彼地獄人惡業既盡命終之後不復見於𨶒羅獄卒何以故以彼是非衆生數故如油炷盡則無有燈業亦爾不復見於𨶒羅獄卒如𨶒浮提日光既現則無暗冥惡業盡時𨶒羅獄卒亦復如是惡眼惡口如衆生相可畏之色皆悉磨滅如破畫壁畫亦隨滅惡業畫壁亦復如是不復見於𨶒羅獄卒可畏之色以此文證衆生惡業應受苦者自然無中妄見地獄涅槃經云凡夫之人五欲所縛令魔波旬自在將去如彼獵師擒拊獼猴擔負歸家善男子譬如國王安住己界身心安樂若至他界則得衆苦一切衆生亦復如是若能自住於己境界則得安樂若至他界則遇惡魔受諸苦惱自境界者謂四念處他境界者謂五欲也五欲者男女身上色聲香味觸法等是也涅槃經云若有菩薩自言戒淨雖復不與女人和合言語嘲調聽其音聲然見男子隨逐女時或見女人追逐男時便生貪著如是菩薩成就欲法毀破淨戒污辱梵行令戒雜穢不得名為淨戒具足又智度論云菩薩觀種種不淨於諸衰中女衰最重刀火雷電霹靂怨家毒之屬猶可暫近女人慳妬瞋諂妖穢鬬諍貪嫉不可親近何以故女子小人心淺智薄唯欲是親不觀富貴智德名聞專行欲惡破人善根桎梏枷鎖閉囹圄雖曰難解猶尚易開女鎖繫人染著根深無可得脫問曰云何為五蓋答曰一貪欲蓋二瞋恚蓋三睡眠蓋四掉悔蓋五疑蓋第一貪欲蓋者謂端坐修禪心生欲覺妄念相續求之不已遂致生患第二瞋恚蓋者瞋是失諸善法之根本墮諸惡道之因緣瞋念覆心故名為蓋當急棄之無令增長故智度論云菩薩觀衆生雖復百千劫罵詈不生嗔心若百千劫稱讚亦不歡喜了知音聲生滅如夢如響第三睡眠蓋者謂內心昏憒名之為眠五情暗弊放恣支節委臥垂熟名之為睡此睡眠蓋能破今世後世實樂如此惡法最為不善何以故餘蓋情覺可除眠如死人無所覺觸以不覺故難可除滅第四掉悔蓋者有三一口掉者謂好喜吟咏諍競是非無益戲論世俗是非言話等名為口掉二身掉者謂好喜騎乘馳放逸筋骨相撲扼指掌等名為身掉三心掉者心情放蕩縱意攀緣思惟文藝世間才伎諸惡覺觀等名為心掉掉之為法破出家心所言悔者若掉無悔則不成蓋何以故掉猶在緣中故後欲入定時方悔前所作憂惱覆心故名為蓋第五疑蓋者謂以疑覆心故於諸法中不得定心定心無故於佛法中空無所獲如人入於寶山若無有手無所能取復次通疑甚多未必障定今障定者有三種疑一疑自二疑師三疑法一疑自者而作是念我等諸根暗鈍罪垢深重其非人乎作此自疑定慧不發若欲學法勿當自輕以宿世善根難測故二疑師者彼人威儀相貌如是自尚無道何能教我作是疑慢即為障定欲除之法如臭皮囊中金以貪金故不可棄於皮囊行者亦爾師雖不清淨亦應生於佛想三疑法者如世人多執本心於所受法不能即信敬心受行若生猶豫即法不染心涅槃經云衆生佛性住五陰中若住五隂名曰殺生若有殺生即墮惡道依此生死故有四生又十住毗婆沙論云佛告迦葉有四種破戒比丘似如持戒何等為四一有比丘於戒經中盡能具行而說有我是名破戒似如持戒二有比丘誦持經律守護戒行於身見中不動不離是名破戒似如持戒三有比丘具行十二頭陀而見諸法定有是名破戒似如持戒四有比丘緣衆生行慈心聞諸行無生相心則驚畏是名破戒似如持戒以此文證故知愚人雖依戒行身口無過謬執乖理心無道戒若能觀見色心無我此智清淨方有道戒戒行既然施等亦爾若依毗曇論云身見邊見唯迷苦諦謂凡夫皆執苦執為我是故身見緣苦諦生依身苦報計斷計常是故邊見亦迷苦生故雜心云身邊二見果處起故唯迷苦諦凡計罪福是我所作不將善惡業因為我是故身見不依集起知集非我不名迷集邊見依身亦不依集又亦不將滅道為我計斷計常義皆同此是故身邊唯依苦報名迷苦諦若論戒取迷苦及道謂有愚人直爾聞說精勤苦行能斷生死不知此說曉夜勵心勤觀苦空方斷生死即謂事中苦身是不知身苦非是聖道是故戒取迷苦諦生或有不將身苦為道直執戒等福行為道此將集因轉將為道如此戒取名迷道諦理實凡愚不識集因妄執為道應是迷集但彼迷心不計福行以為集因方轉為道是故不得名為迷集不同計苦以為道者將苦為道故名迷苦是故戒取有迷苦者有迷道者不迷於集滅是聖果衆生所求不取惑滅為道因行是故戒取不名迷滅若論邪見見取及疑此三皆悉通迷四諦所謂邪見謗無因果該凡及聖是故通迷若論見取於自身報取為第一即為迷苦於事善業計為第一即名迷集若取梵天無想天等以為涅槃名為迷滅於彼戒取所言之道取為第一名為迷道是故見取通迷四諦若論疑心於諸凡聖因之與果不知有無生疑不决故亦疑四向來所明五見及疑惟迷諦理不名迷事以迷理故觀見理時知無我人方斷我心證知慧觀能斷煩惱凡夫因果苦集非道識觀是道方斷戒取正識滅道以為第一不將有漏以為勝好知世可厭方斷見取以見四諦不生疑謗證信决定方斷邪疑是故身邊戒見邪疑迷理而生還見理斷俱舍論云在家由取五塵故與在家起鬪諍出家由取諸見各不同故與出家起鬪爭又成論云若人持戒取為清淨名戒取結即謂所取以為真實餘皆妄語名見取結此二是其出家之人鬪爭根本亦即名為隨順苦邊又依此戒取能捨入真聖道此非正道非清淨道能隨苦過又戒取是出家人縛諸欲是在家人縛又戒取者雖復種種行出家法空無所得又因此戒取能謗正道及行正道者又戒取是諸外道起憍慢處作如是念能勝餘人以此等文證知戒取等唯是世善招生死果故名隨苦非真道法唐顯慶年中長安城西路側店上有家新婦誕一男月滿日親慶會買得一羊欲煞羊數向屠人跪拜屠人報家內家內大小不以為徵遂即殺之將肉釜煮餘人貪斷理葱蒜餅食令産婦抱兒看煮肉抱兒前火釜大極牢忽然自破釜湯衝灰火直射母子母子俱亡親族及鄰人見者莫不酸切店人見聞之者永斷酒肉同店人向道自說禪祕要經云若有四衆於佛法中為利養故貪求無厭為好名聞而假僞作惡實不坐禪身口放逸行放逸行貪利養故自言坐禪如是比丘犯偷蘭遮過時不說自不改悔經須間即犯十三僧殘若經一日至於二日當知此比丘是天人中賊羅剎魁膾必墮惡道犯大重罪又十誦律云若語高姓人云是下賤若兩眼人云是一眼並得妄語又語一眼人汝是瞎眼人並得輕惱他罪法句經云雖為沙門不攝身口粗言惡說多所中傷衆所不受智者不惜身死神去輪轉三塗自生自死苦惱無量諸佛賢聖所不愛惜假令衆生身雖無過不慎口業亦墮惡道菩薩地經云邪見有二種一者可轉二者不可轉誹謗因果言無聖人名不可轉非因見因非果見果是名可轉是故惡業名為邪見善業者名為正見不謗四諦迷聖者不知理道從自心生唯常苦身以求解脫如犬逐塊不知尋本故大莊嚴論云譬如師子打射時而彼師子尋逐人來譬如癡犬有人打擲便逐瓦石不知尋本言師子者喻智慧人解求其本而滅煩惱言癡犬者即是外道五熱炙身不識心本但諸凡愚多迷真道不知觀察身心無我但學苦行以為道者即同外道妄行邪法謬執乖真唯成惡法故智度論云邪見罪重故雖持戒等身口業好皆隨邪見惡心如佛自說譬喻如種苦種雖復四大所成皆作苦味邪見之人此亦如是雖持戒精進皆成惡法不如不執少行慧施無執易化有執難度非直自壞亦損他人故成實論云寧止不行勿行邪道身壞命終墮於惡趣未曾有經云天帝問曰施食施法有何功德惟願說之野干答曰布施飲食濟一日之命施珍寶物濟一世之乏增益繫縛說法教化名為法施能令生出世間道又優婆塞戒經云若有比丘比丘尼優婆塞優婆夷能教化人具足戒施多聞智慧若以紙墨令人書寫若自書寫如來正典然復施人令得讀誦是名法施如是施者未來天上得好上色何以故衆生聞法斷除瞋心以是因緣未來世中得成上色衆生聞法慈心不殺以是因緣未來世中得壽命長衆生聞法不盜他財寶以是因緣未來世中多饒財寶衆生聞法開心樂施以是因緣未來世中身得大力衆生聞法離諸放逸以是因緣未來世中身得安樂衆生聞法除瞋癡心以是因緣未來世中得無礙辨才衆生聞法信心無疑以是因緣未來世中信心明了戒施聞慧亦復如是故知法施殊勝過於財施問既知法施勝過財施今時衆生但學法施不行財施未知得不答為不解財施迷心而施苟求色身人天樂報恐墮三塗不成出世所以聖人殷勤歎法令其悟解三事體空而行財施遠成菩提涅槃聖果自餘戒忍六度萬行皆藉智慧開導成勝智度論問云何布施得到彼岸不得到彼岸答曰如舍利弗於六十劫中行菩薩道欲度彼岸時有乞人來乞其眼舍利弗言眼無所任何以索之若須我身及以財物者當以相與答言不須唯欲得眼若汝實行檀者以眼見與爾時舍利弗出一眼與之乞者得眼於舍利弗前嗅之嫌臭唾而棄地又以踏舍利弗思惟言如此弊人難可度也眼實無用而強索之既得無用而棄又以腳踏何弊之甚如此人輩不可度也不如自調早度生死思惟是已於菩薩道退回向小乘是名不到彼岸若能不退成辦佛道名到彼岸如優婆塞戒經云若施畜生得百倍報施破戒者得千倍報施持戒者得十萬報施外道離欲人得百萬報施向道者得千億報施須陀洹得無量報向斯陀含亦無量報乃至施佛亦無量報我今為汝分別諸福田故作是說若能至心生大憐愍施於畜生專心恭敬施於諸佛其福正等無有差別言百倍得如以壽命色力安辨施於彼者施主後得壽命色力安樂辨才各各百倍乃至無量亦復如是是故我於契經中說我施舍利弗舍利弗亦施於我然我得福多非舍利弗得福多也或有人說受者作惡罪及施主是義不然何以故施主施時為破彼苦非為作罪是故施主應得善果受者作惡罪自鍾己不及施主問若施聖人得福多者云何經說智人行施不揀福田答今釋此意義有多途明能施之人有愚智之別所施之境有悲敬之殊悲是貧苦敬是三寶悲是田劣而心勝敬是田勝而心劣若取心勝施佛財不如施貧故像法决疑經云有諸衆生見他聚集作諸福業但求名聞傾家財物以用布施及見貧窮孤獨呵罵驅出不濟一毫如此衆生名為顛倒作善癡狂禍福名為不正作福如此人等甚可憐愍用財甚多獲福甚少善男子我於一時告諸大衆若人於阿僧祇身供養十方諸佛并諸菩薩及聲聞衆不如有人施畜生一口飲食其福勝彼百千萬倍無量無邊乃至施與餓狗蟻子等悲田最勝如月燈三昧經云佛言若有菩薩信樂檀波羅蜜者有十種利益何等為十一降伏慳吝煩惱二修習捨心相續三共諸衆生同其資産攝受堅固而至滅度四生豪富家五在所生處施心現前六常為四衆之所愛樂七處於四衆不怯不畏八勝名流布遍於諸方九手足柔軟足掌安平十乃至道𣗳不離善知識𥨸聞戒是人師道俗咸奉心為業主凡聖俱制良由三寶所資四生同潤故經曰正法住正法滅意在茲乎是以持戒為德顯自大經性善可崇明乎大論或復方之日月譬若寶珠義等塗香事同惜水越度大海號曰牢船生長善芽又稱平地是以菩薩禀受微塵不羅漢護持纖芥無犯寧當抱渴而死弗飲水蟲乃可被繫而終無傷草葉言行忠信戰戰兢兢豈可放縱心馬不加轡勒馳騁情猴都無制鎖浮囊既毀前路何期德瓶已破勝緣長絶或復要聚惡人朋結凶黨更相扇動備造愆瑕無慚無愧不羞不耻日更增甚轉復沉浮似若葶藶艾蒿枝葉皆苦訶梨果樹遍體無甘從明入暗無復出期劫數既遙痛傷難忍於是鑊湯奔沸猛氣衝天炭赫𦏁𪹼聲烈地鎔銅灌口則腹爛肝銷銅柱逼身則骨肉俱盡𭓩轉嗚呼何可言念如斯等苦實由毀戒也菩薩藏經云舍利子菩薩摩訶薩行尸波羅密多故獲得十種清淨尸羅汝應知之何等為十一者於諸衆生曾無損害二者於他財物不行劫盜三者於他妻妾遠諸染習四者於諸衆生不興欺誑五者和合眷屬無有乖離六者於諸衆生不起粗言由能堪忍彼惡言故七者遠離𦂶語凡有所言諦審說故八者遠諸貪著於他受用無我所故九者遠離嗔恚善能忍受粗言辱故十者遠離邪見由不敬事諸餘天仙及神鬼故如菩薩藏經云夫忿恚者速能損害百千大劫所集善根若諸善根為嗔害己復當經於百千大劫方始勤苦修行聖道若如是者阿耨菩提極難可得是故我當被忍辱鎧以堅固力摧忿恚軍舍利子我今為汝廣說其事我念過去世為大仙人名修行處時有惡魔化作五百健罵丈夫𢘆尋逐我與諸惡罵晝夜去來行住坐臥僧坊靜室聚落俗家若在街巷若空閒處隨我坐立是諸化魔以粗惡言毀罵訶責滿五百年未曾休廢舍利子我自憶昔五百歲中為諸魔羅之所訶毀未曾於彼起微恨心𢘆興慈救而用觀察又私阿昧經云佛言忍有六事得一切智何等為六一得身力二得口力三得意力四得神足力五得道力六得慧力六度集經云復有四種忍辱具足智慧何等為四一於求法時忍他惡罵二於求法時不避饑渴寒熱風雨三於求法時隨順和上阿闍𥠖行四於求法時能忍空無相無願如持世經云寶光菩薩於𨶒浮檀金佛所發於精進但為入如是法方便門二十億歲終不生惡心若利養心又寶光菩薩如是精進十二億歲未曾發起淫怒癡心又無量意菩薩無量力菩薩於四萬歲中終不睡眠常不滿腹食亦不臥若坐若經行常念五取陰相又譬喻經云羅閲祗國沙門坐自誓曰我不得道終不起欲睡眠作錐長八寸刺兩䏶痛不得眠一年得道又大寶積經云第四精進有十念一念佛無量功德二念法不思議解脫三念僧清淨無染四念行大慈安立衆生五念行大悲濟衆苦六念正定聚勸樂修善七念邪定聚令反本八念諸餓鬼饑渴熱惱九念諸畜生長受衆苦十念諸地獄備受燒煮菩薩如是思惟十念三寶功德專念不亂是名正念精進夫五欲蓋纏並是禪障既能除棄其心寂靜堪能修道故此內具明十二頭陀之行少欲知足無過此等西云頭陀此云抖擻能行此法即能抖擻煩惱去離貪著如衣抖擻能去塵垢是故從喻為名故頭陀經論別明各云十二通別總論合有十六如衣中有四食中有六處中有六故合十六衣中四者一糞掃衣二毳衣三衲衣四三衣食中有六者一乞食二次第乞食三不作餘食法食四一坐食五一團食亦名節量食六中後不飲漿處中六者一阿蘭若處二在塜間三在𣗳下四在露地五是常坐六是隨坐就此十六隱顯離合故說十二如衣中四者依四分律及智度論同惟說二一著納衣二著三衣不論餘二依涅槃經衣中說三一著糞掃衣二著毳衣三畜三衣不論納衣食中六者涅槃說三所謂乞食一坐食一團食所以不說次第乞者以能如法乞食之時必有次第故不別說但能一團一坐食自然不作餘食法中後飲漿故不別說四分律中說食有四三種同前加次第乞智度論中說食有五不說不作餘食法食處中六者依智度論說五除却隨坐涅槃及律皆具說六今依諸部通有十六也如大寶積經云菩薩修定復有十法不與二乘共何等為十一修定無有吾我具足如來諸禪定故二修定不味不著捨離身心不求己樂三修定具諸通業為知衆生諸心行故四修定為知衆生心度脫一切諸衆生故五修定行於大悲斷諸衆生煩惱結故六修定諸禪三昧善知入出過於三界故七修定常得自在具足一切諸善法故八修定其心寂滅勝於二乘諸禪三昧故九修定常入智慧過諸世間到彼岸故十修定能興正法紹隆三寶使不斷絶故如是定者不與聲聞辟支佛共又月燈三昧經云佛言若有菩薩住於宴坐有十種利益何等為十一其心不濁二住不放逸三三世諸佛愛念四信正覺行五於佛智不疑六知恩報恩七不正法八善能防禁九到調伏地十證無得智又佛言若有菩薩愛樂空間有十種利益何等為十一省世事務二遠離衆閙三無有違諍四㑅無惱處五不增有漏六不起諍訟七安住靜默八隨順相續解脫九速證解脫十少施功而得三昧大寶積經云百千萬劫久習結業以一實觀即皆消滅又諸法無行經云若菩薩能見一切衆生性即涅槃性則能畢竟滅業障罪故又普賢菩薩經云觀心無心從顛倒想起如此想心從妄想起如空中風無依止處故知善惡取性作相由未悟理非無妄業後若悟理前業即滅無法可住故不招生未曾有經云前心作惡如雲覆日後心起善如炬消暗又大集經云如百年垢衣可於一日浣令鮮淨如是百千劫中所集諸不善業以佛法力故善順思惟可於一日一時盡能消滅也智度論問曰五戒一日戒何者為勝答曰有因緣故二戒俱等但五戒終身持八戒一日持又五戒常持時多而戒少一日戒時少而戒多若無大心雖復終身持不如有大心一日戒也譬如軟夫為將雖復將兵終身卒無功名若英雄奮發禍亂立定一日之勳名蓋天下八戒比於餘戒亦復如是問曰何故六齊日受八戒修福德答曰是日鬼神逐人欲奪人命疾病衰令人不吉以劫初聖人教人持齊修善治福以避凶衰是時齊法不受八戒直以一日不食為齊後佛出世始教一日一夜如諸佛受持八戒過中不食是功德將人至涅槃樂提謂經云提謂長者白佛言世尊歲三齊皆有所因何以正用正月五月九月六日齊用月八日十四日十五日二十三日二十九日三十日佛言正月者少陽用事萬神代位隂陽交精萬物萌生道氣養之故使太子正月一日持齊寂然行道以助和氣長養萬物故使竟十五日五月者太陽用事萬物代位草木萌類生畢百物懷妊未成成者未壽皆依道氣故持五月一日齊竟十五日以助道氣成長萬物九月者少隂用事乾坤改位萬物畢終衰落無牢衆生蟄藏神氣歸本因道自寧故持九月一日齊竟十五日春者萬物生夏者萬物長秋者萬物收冬者萬物藏依道生沒天地有大禁故使弟子樂善者避禁持齊救神故爾長者提謂白佛言三長齊何以正月一日至十五日復言如何名禁佛言四時交代陰陽易位歲終三覆以校一月六奏三界浩浩五處録籍衆生行異五官典領校定罪福行之高下品格萬途諸天帝釋太子使者日月鬼神地獄𨶒羅百萬神衆等俱用正月一日五月一日九月一日四布案行帝王臣民八夷飛鳥走獸鬼龍行之善惡知與四天王月八日十五日盡三十日所奏同無不均天下使無枉錯覆校三界衆生罪福多少所屬福多者即生天上即敕四鎮五官大王司命增壽益算下𨶒羅王攝五官除罪名定福祿故使持是三長齊是故三覆八校者八王日是也亦是天帝釋輔鎮五官四王地獄主阿須輪諸天案行比校定生注死增减罪福多少有道意無道意大意小意開解不開解出家不出家案比口數皆用八王日何等八王日謂立春春分立夏夏至立秋秋分立冬冬至是謂八王日天地諸神隂陽交代故名八王日月八日十四日十五日二十三日二十九日三十日皆是天地用事之日上下弦望朔晦皆録命上計之日故使於此日自守持齊以還自校使不犯禁自致生善處增一阿含經云若善男子善女人欲得八關齊離諸苦者得盡諸漏入涅槃城當求方便成此八齊人中榮位不足為貴天上快樂不可稱計欲求無上之福者當求此齊欲生六欲天色無色界天者當持此齊欲求一方二方三方四方天子轉輪聖王位者亦獲其願欲求聲聞緣覺佛乘者悉成其願吾今成就由其持戒八戒十善無願不獲佛說齊經佛法齊者內首弟子月六齊日受持八戒何謂八耶第一戒者盡一日一夜持心無煞意慈念衆生不得殘害蠕動之類如清淨戒以一心習第二戒者盡一日一夜持心無貪意思念布施𨚫慳貪意如清淨戒以一心習第三戒者一日一夜持心無淫意不念房室修治梵行不為邪欲如清淨戒以一心習第四戒者一日一夜持心無妄語思念至誠言不為詐心口相應如清淨戒以一心習第五戒者一日一夜持心不飲酒不醉迷亂去放逸意如清淨戒以一心習第六戒者一日一夜持心無求安不著華香不傅脂粉不為歌舞倡樂如清淨戒以一心習第七戒者一日一夜持心無求安不臥好床𤰞床草席捐除睡臥思念經道如清淨戒以一心習第八戒者一日一夜持心奉法時過中不食如清淨戒以一心習迦葉經云佛告迦葉於正法中得出家者應作是念十方世界見在諸佛悉知我心莫於佛法作沙門賊迦葉云何名沙門賊沙門賊有四種何等為四迦葉若有比丘整理法服似像比丘而破禁戒作不善法是名第一沙門之賊二者於日暮後其心思惟不善之法是名第二沙門之賊三者未得聖果自知凡夫為利養故自稱我得阿羅漢果是名第三沙門之賊四者自讚毀他是名第四沙門之賊迦葉譬如有人具大勢力於三千大千世界衆生所有珍寶一切樂具刀杖加害皆悉奪取迦葉於汝意云何此人得罪寧為多不迦葉白佛言甚多世尊佛告迦葉若有凡夫未得聖果為利養故自稱我得須陀洹果若受一食罪多於彼我觀沙門法中更無有罪重於妄稱得聖果者又涅槃經云出家之人有四種惡病是故不得四沙門果何等四病謂四惡欲一為衣欲二為食欲三為臥具欲四為有欲有四良藥能療是病一糞掃衣能治比丘為衣惡欲二乞食能破比丘為食惡欲三𣗳下坐能破比丘為臥具惡欲四身心寂靜能破比丘為有惡欲以是四藥除是四病是名聖行如是四行則得名為少欲知足也又像法决疑經云未來世中一切俗人輕賤三寶正以比丘比丘尼不如法故身披法服經理俗緣或復市肆販賣自活或復涉路商賈求利或作畫師經生像匠工巧之業或占相男女舍屋田園種種吉凶或飲酒醉業舞作樂圍碁六博或貪財求利延時歲月廢忘經歌或呪術治病假托經書修禪占事以邪活命或行醫針灸合和湯藥診脉處方男女交雜因私致染販善增惡招俗譏良由於此夫出家之人為求解脫先須離罪以戒為首若不依戒衆善不生如人無頭諸根亦壞名為死人菩薩受齊經云某自歸佛自歸法自歸比丘僧某身所行惡口所言惡意所念惡今已除棄某若干日若干夜受菩薩齊自歸菩薩佛告須菩提菩薩齊日有十戒第一菩薩齊日不得著脂粉華香第二菩薩齊日不得歌舞伎樂裝飾第三菩薩齊日不得臥高牀上第四菩薩齊日過中已後不得復食第五菩薩齊日不得持刀金銀珍寶第六菩薩齊日不得乘車牛馬第七菩薩齊日不得捶兒子奴婢畜生第八菩薩齊日皆持是齊從分檀布施得福菩薩齊日去臥時於佛前義手言今日一切十方其有持齊戒者行六度者某皆助安無量勸助歡喜福施十方一切人非人等所在勤苦厄難之處皆令得福解脫憂苦出生為人安隱富樂無極第九菩薩齊日不得飲食盡器中第十菩薩齊日不得與女人相形笑共座席女人亦爾是為十戒不得犯不得教人犯亦不得勸勉人犯菩薩戒齊法言南無佛南無法南無比丘僧某若干日若干夜持菩薩齊從分檀布施當得六波蜜如諸菩薩六萬菩薩法齊日夜一分禪一分讀經一分臥是為菩薩齊日法從正月十四日受十七日解從四月八日受十五日解從七月一日受十六日解從九月十四日受十六日解述曰既受齊已若欲解齊要待明相出時始得食粥不爾破齊何名明相如薩婆多論云明相有三種色若日照𨶒浮提樹則有黑色若照樹葉則有青色若過樹葉則有白色於三色中白色為正始得解齊食其粥也增一阿含經云世尊告諸比丘有人似師子者有似羊者云何似師子者或有人得供養衣食等便自食噉不起染著之心設不得利養不起亂念無增減心猶如師子王食噉小畜生不生好惡染著之心云何似羊猶如有人受人供養便自食噉起染著心不知惡道而自貢高猶如羣羊有一羊出羣已詣大糞聚飽食𡱁已還至羊羣而自貢高我得好食諸羊不得是故比丘當學師子王莫如食糞羊也佛藏經云或有比丘因以我法出家受戒於此法中勤行精進雖天神諸人不念但能一心精進行道者終亦不念衣食所須所以者何如來福藏無量難盡舍利弗設使一切世間人皆共出家隨順法行於白毫相百千億分不盡其一舍利弗如來如是無量福德若諸比丘所得飲食及所須物趣得皆足舍利弗是故比丘應如是念不應於所須物行諸邪念惡法又迦葉經云時五百比丘云我等不能精進恐不能消信施供養請乞歸俗文殊師利菩薩讚言若不能消信施之食寧可一日數百歸俗不應一日破戒受人信施爾時世尊告文殊師利菩薩言善男子若有修禪解脫者我聽彼人受信施食問曰無病飲得罪有病開飲不答曰依四分律實病餘藥治不差以酒為藥者不犯問曰開服幾許答曰依文殊師利問經云若合藥醫師所說多藥相和少酒多藥得用又舍利弗問經云舍利弗白佛言云何世尊說遮道法不得飲酒如葶藶子是名破戒開放逸門云何迦蘭陀竹園精舍有一比丘疾病經年危篤將死時優婆離問言汝須何藥我為汝覔天上人間乃至十方是所應用我皆為取答曰我所須藥是違毗尼故我不覔以至於此寧盡身命無容犯律優婆離言汝藥是何答曰須酒五升優婆離曰若為病開如來所許為乞得酒服已消差差已懷慚猶謂犯律往至佛所殷勤悔過佛為說法聞已歡喜得羅漢道佛言酒有多失開放逸門飲如葶藶子犯罪已積若消病苦非先所斷涅槃經云一切衆生有四毒箭則為病因何等為四一貪欲二瞋恚三愚癡四憍慢若有病因則有病生所謂愛熱肺病上氣吐逆膚體㿇㿇其心悶亂下痢噦噎小便淋瀝眼耳疼痛腹背脹滿顛狂乾消鬼魅所著如是種種身心諸病若識病本斷惡修善三世苦報永除不受若不觀理縱用天下藥酒所治其病轉增難可得差央掘魔經云文師利白佛言世尊因如來藏故諸佛不食肉邪佛言如是一切衆生無始生死生生輪轉無非父母兄弟姊妹猶妓兒變易無常自肉他肉則是一肉是故諸佛悉不食肉復告文一切衆生界我界即是一界所肉之肉即是一肉是故諸佛悉不食肉佛告文若自死牛牛主持皮用作革屣施持戒人為應受不若不受者是比丘法若受者非悲然不破戒以從展轉離殺因緣故也𣈆有荊州長沙寺僧釋法遇不知何人弱年好學篤志墳典事道安為師解悟非常乃避地東下止江陵長沙寺講說衆經受業者四百餘人時有一僧飲酒廢夕燒香遇但止罰而不遣安公遙聞之以竹筒盛一荊子手自緘封題以寄遇遇開封見杖即曰此由飲酒也我訓領不勤遠貽憂賜即命維那鳴椎集衆以杖筒置香上行香畢遇乃起出衆前向筒致敬於是伏地令維那行杖三下內杖筒中淚自責時境內道俗莫不歎息因之學徒勵業甚衆既而與慧遠書曰吾人微暗短不能率衆和上雖隔在異域猶遠憂念吾罪深矣後卒于江陵春秋六十周武帝好食雞卵一食數枚有監膳儀同名虎常進御食有寵隋文帝即位猶復監膳進食開皇中暴死而心尚暖家人不忍𣩵之三日乃蘇能語先云輿我見至尊為武帝傳語既現而請文帝引問言曰始忽見人來喚隨至一處有大地穴所行之道徑入才到穴口遙見西方有百騎來儀衛如王者俄至穴口乃周武帝也儀同拜之帝曰王喚汝證我事耳汝身無罪言訖即入宮中使者亦引儀同令見宮門引入前見武帝與王同坐而有加敬之容使者令儀同拜王王問曰汝為帝作食前後進白團幾枚儀同不識白團顧左右左右教曰名雞卵為白團也儀同即答帝食白團實不記數王謂帝曰此人不記當須出之帝𢡖然不樂而起忽見庭前有鐵牀并獄卒數十人皆牛頭人身帝已臥牀上獄卒用鐵梁壓之帝兩脅剖裂處雞子全出俄與牀齊可十餘斛乃盡王命數之訖床及獄卒忽然不見帝又已在王坐帝謂儀同云為我相聞大隋天子昔與我共食倉庫玉帛亦我儲之我今身為滅佛法極受大苦可為吾作功德也於是文帝勑天下人出一錢為追福焉如僧祗律云若在禪坊中者不得放恣大若來時當忍以手掩鼻若不可忍者應手鼻而勿涕唾污比座若上座者應言和南下座默然又毗尼母經云氣有二種一者上氣二者下氣上氣欲出時莫當人張口令出要回向無人處張口令出若下氣欲出時不聽衆中出要作方便出外至無人處令出然後來入衆莫使衆議嫌污賤入塔時不應放下氣安塔𣗳下大衆中皆不令出氣師前大德上座前亦不得放下氣出聲若腹中有病急者應出外莫令生污賤心善生經云聸病人不應生厭若自無物出外求之若不得貨三寶物看差已十倍還之五百問事云看病人將病人物為病人供給所須不問病者或問起嫌並不得用若已取者應償不還犯重罪又四分律云看病得五功德一知病人可食不可食可食便與二不惡賤病人大小便利唾吐三有慈愍心不為衣食故看四能經理湯藥乃至差若命終五能為病人說法歡喜己身善法增長貞觀年中西京弘福寺有僧名玄覽趙州房子人常樂禪誦禮悔為業每語法屬曰雖同𢘆業而誓欲捨身至貞觀十八年四月初脫諸衣服總作一幞付本寺僧惟著一覆單衣密去至京東渭隂洪陂坊側旦臨渭水稱念禮訖投身波中衆人接出覽告衆曰吾誓捨身命久矣意欲學大士難捨能捨諸經正行幸勿固遮而妨其業衆悟意盛故乃從之又即入水合掌稱佛廣發願已便投旋渦於三日後其尸方出村人接取為起塔銘本寺怪其不歸便開衣幞乃見遺文云敬白十方三世諸佛弟子玄覽自出家來一十二夏雖沾僧數大業未成今欲修行檀波羅蜜行如薩埵捨身尸毗割股魚王肉山經文具載請從聖訓敢附後塵衣物衆具任從佛教臨終之日人多不委同學見書方往尋究知死符同遺文不異喻伽論云此有情者非色非心假為命者大小皆同死通漸頓諸師相傳造善之人從下冷觸至臍以上暖氣後盡即生人中若至頭靣熱氣後盡即生天道若造惡者與此相違從上至腰熱後盡者生於鬼趣從腰至熱氣盡者生於畜生從已下乃至盡生地獄中無學之人入涅槃者或在心暖或在頂也婆多部云若同於人道中受生同是人道中隂互得相見此義為定不能見餘道中隂若人修得天眼此天眼則是道類能見中隂色若報得天眼則不能見中隂色中隂色細餘色故依正量部云天道中陰備能見五道中隂色人道中隂能見四道除天道中隂非其所能見如是次第除前乃至地獄道中隂除前四道中隂非其所見惟見地獄道中隂唐琅琊王之弘貞觀年中為沁州和川縣令有女適博陵崔䡄䡄於和州會病而卒卒經數十日其家忽於夜中聞䡄語聲初時傾家驚恐其後乃以為常聞語云䡄是女壻雖不合於妻家立靈然以苦無所依但為置立也妻從其請朝夕置食不許置肉惟令下其素食𢘆勸禮佛不聽懈怠又具說地獄中事云人一生𢘆不免殺生及不孝自餘之罪蓋亦小耳又云軌雖無罪然大資福助為䡄數設齊供并寫法華金剛般若觀音等經各三兩部兼舊功德如獲羅漢自茲以後即不復來王家一依其言寫經設供䡄忽更來愧謝因云今即取別舉家哭而送之䡄有遺腹之子已年四五歲云此子必有仕宦願善養畜自此以後不復更來地持論云所謂五濁者一曰命濁二曰衆生濁三曰煩惱濁四曰見濁五曰劫濁謂今世短壽人極百歲是名命濁若諸衆生不識父母不識沙門婆羅門及宗尊長不修義理不作所作不畏今世後世惡業果報不修惠施不作功德不修齊法不持禁戒是名衆生濁若此衆生增非法貪刀劍布施器仗布施諍訟𨷖亂諂曲虛誑妄語攝受邪法及餘惡不善法生是名煩惱濁若於今世法壞法沒像法漸起邪法轉生是名見濁若饑饉劫起疾病劫起刀兵劫起是名劫濁又俱舍論云何者為五濁一命濁二劫濁三惑濁四見濁五衆生濁下劫將來命等五濁最粗最下已成滓故說名為濁由前二濁次第損減壽命及損減樂具復由二濁損減助善何以故因此二濁有諸衆生多習欲塵樂行及自苦行能損在家出家助善由後一濁減自身量色無病力智念正勤不動此德壞故又持人菩經云如來今興在五濁世何謂五濁一人多弊惡不識義理二六十二疑邪見強盛不受道教三人多愛欲塵勞興隆不知去就四人壽命短往古世時八萬四千歲以為甚損今壽百歲或長或短五小劫轉盡三災當起無不被害若有在此五濁惡世能信樂佛正真慧是為甚難又大五濁經云佛涅槃後當有五亂一者當來比丘從白衣學法世之一亂二者白衣上坐比丘處下世之二亂三者比丘說法不行承受白衣說法以為無上世之三亂四者魔家比丘自生現在於世間以為真道諦佛法正典自為不明詐僞為信世之四亂五者當來比丘畜養妻子奴僕治生但共諍訟不承佛教世之五亂今時屢見無識白衣觸事不閒詐為知法房室不捨然為師範愚癡俗人以用指南虛棄功夫終勤無益未來生世猶不免獄故智度論云有其盲人自不見道妄言見道引他五百盲人並墮糞坑自處長津焉能救溺增一阿含經云爾時世尊告諸比丘衆生之類有四種食長養衆生何等為四所謂假食或大或小更樂食念食識食是謂四食彼云何假食謂今人中所食諸入口之物可食噉者是謂假食云何更樂食謂衣裳繖蓋雜沓華熏火及香油與婦人集聚諸餘身體所更樂者是謂更樂食云何念食謂意中所念所想所思惟者或以口說或以體觸及諸所持之法是謂念食云何識食謂意之所知梵天為首乃至有想無想天以識為食是謂識食以此四食流轉生死又增一經云世尊告阿那律曰一切諸法由食而存眼以眠為食耳以聲為食鼻以香為食舌以味為食身以細滑為食意以法為食涅槃以無放逸為食爾時佛告諸比丘如此妙法夫觀食有九事人間有四食一假食二更樂食三念食四識食復有五種是出世間食一禪恱食二願食三念食四八解脫食五喜食是出世間之食當共專念捨除四種之食求辦出世之食增一阿含經云若不成就六法則不能遠塵離垢得法眼淨何等為六一不樂聞法二雖聞法不攝耳聽三不為知解四未得法不方便勤求五所得法不善守護六不成就順忍反此六種則能遠塵離垢得法眼淨又新婆沙論問異生聖者誰有怖耶有作是說異生有怖異生舊名凡夫聖者無怖所以者何聖者已離五怖畏故五怖畏者一不活畏二惡名畏三怯衆畏四命終畏五惡趣畏又雜寶藏經云佛言此如意珠是摩竭大魚腦中出魚身長二十八萬里此珠名曰金剛堅也有第一力耐使一切被毒之人見悉消滅又見光觸身亦復消毒第二力者熱病之人見則除愈光觸其身亦復得差第三力者人有無量百千家捉此珠者悉得親善諸天一瓜甲價直一𨶒浮提人物
